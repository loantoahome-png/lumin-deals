<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Reminders — Matt & Moe</title>

<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #ffffff;
    color: #1e293b;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: #ffffff;
    border-bottom: 1px solid #e2e8f0;
    padding: 1.5rem 1rem 1rem;
    text-align: center;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
    position: relative;
  }
  header h1 {
    font-size: 1.75rem;
    font-weight: 800;
    background: linear-gradient(135deg, #0ea5e9, #8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  header p { color: #64748b; margin-top: .25rem; font-size: .875rem; }

  .meta-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    margin-top: .5rem;
    flex-wrap: wrap;
  }
  .sync-badge {
    display: inline-flex;
    align-items: center;
    gap: .35rem;
    font-size: .75rem;
    color: #10b981;
    font-weight: 600;
  }
  .sync-badge.offline { color: #f59e0b; }
  .sync-dot {
    width: 8px; height: 8px;
    background: currentColor;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }

  .user-chip {
    font-size: .75rem;
    color: #475569;
    background: #f1f5f9;
    padding: 3px 10px;
    border-radius: 999px;
    font-weight: 600;
  }

  .notif-btn {
    background: none;
    border: 1px solid #e2e8f0;
    color: #64748b;
    cursor: pointer;
    font-size: .75rem;
    padding: 3px 10px;
    border-radius: 999px;
    font-weight: 600;
    transition: all .15s;
  }
  .notif-btn:hover { background: #f1f5f9; color: #334155; }
  .notif-btn.enabled { background: #dcfce7; border-color: #86efac; color: #166534; }

  .gear-btn {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: none;
    border: none;
    color: #94a3b8;
    cursor: pointer;
    font-size: 1.25rem;
    padding: .35rem .5rem;
    border-radius: 6px;
    transition: background .15s, color .15s;
  }
  .gear-btn:hover { background: #f1f5f9; color: #475569; }

  /* ── Board ── */
  .board {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    max-width: 1100px;
    margin: 1.5rem auto;
    padding: 0 1.25rem;
  }
  @media (max-width: 680px) { .board { grid-template-columns: 1fr; } }

  .column {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    padding: 1.25rem;
    box-shadow: 0 2px 8px rgba(0,0,0,.05);
  }
  .column-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
    padding-bottom: .75rem;
    border-bottom: 2px solid;
  }
  .col-matt .column-header    { border-color: #0ea5e9; }
  .col-moe  .column-header    { border-color: #8b5cf6; }
  .col-general .column-header { border-color: #10b981; }
  .column-header h2 { font-size: 1.15rem; font-weight: 700; }
  .col-matt h2    { color: #0369a1; }
  .col-moe  h2    { color: #6d28d9; }
  .col-general h2 { color: #047857; }

  .task-count {
    font-size: .75rem;
    padding: 2px 9px;
    border-radius: 999px;
    font-weight: 700;
  }
  .col-matt    .task-count { background: #e0f2fe; color: #0369a1; }
  .col-moe     .task-count { background: #ede9fe; color: #6d28d9; }
  .col-general .task-count { background: #d1fae5; color: #047857; }

  .board-full { grid-template-columns: 1fr !important; }

  /* ── View tabs ── */
  .view-tabs {
    max-width: 1100px;
    margin: 1.25rem auto 0;
    padding: 0 1.25rem;
    display: flex;
    gap: .5rem;
    align-items: center;
    flex-wrap: wrap;
  }
  .view-tab {
    background: #f1f5f9;
    border: 1px solid transparent;
    color: #64748b;
    padding: .5rem 1rem;
    border-radius: 999px;
    font-size: .85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
  }
  .view-tab:hover { background: #e2e8f0; }
  .view-tab.active {
    background: #ffffff;
    border-color: #0ea5e9;
    color: #0369a1;
    box-shadow: 0 0 0 3px rgba(14,165,233,.12);
  }
  .view-tab .pill {
    background: #e2e8f0;
    color: #475569;
    font-size: .7rem;
    padding: 1px 7px;
    border-radius: 999px;
    margin-left: .35rem;
    font-weight: 700;
  }
  .view-tab.active .pill { background: #0ea5e9; color: #fff; }

  .clear-btn {
    margin-left: auto;
    background: #fff;
    border: 1px solid #fca5a5;
    color: #dc2626;
    padding: .5rem .9rem;
    border-radius: 8px;
    font-size: .8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
  }
  .clear-btn:hover { background: #fef2f2; }
  .clear-btn:disabled { opacity: .35; cursor: not-allowed; }

  /* ── Show/hide views ── */
  body.view-completed .board { display: none; }
  body.view-completed .urgency-legend { display: none; }
  body.view-active .completed-view { display: none; }

  /* ── Completed view ── */
  .completed-view {
    max-width: 1100px;
    margin: 1rem auto 2rem;
    padding: 0 1.25rem;
  }
  .completed-list {
    display: flex;
    flex-direction: column;
    gap: .5rem;
  }
  .completed-item {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    transition: box-shadow .2s;
  }
  .completed-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  .completed-row {
    display: flex;
    align-items: center;
    gap: .75rem;
    padding: .75rem 1rem;
  }
  .completed-icon { color: #10b981; font-size: 1.05rem; flex-shrink: 0; }
  .completed-body { flex: 1; min-width: 0; }
  .completed-title {
    font-size: .9rem;
    color: #1e293b;
    word-break: break-word;
  }
  .completed-meta {
    display: flex; flex-wrap: wrap; gap: .5rem;
    margin-top: .25rem;
    font-size: .72rem;
    color: #94a3b8;
  }
  .completed-tag {
    padding: 1px 8px;
    border-radius: 999px;
    font-weight: 600;
  }
  .completed-tag.matt    { background: #e0f2fe; color: #0369a1; }
  .completed-tag.moe     { background: #ede9fe; color: #6d28d9; }
  .completed-tag.general { background: #d1fae5; color: #047857; }
  .completed-empty {
    text-align: center;
    color: #94a3b8;
    font-size: .9rem;
    padding: 3rem 0;
  }

  /* ── Add-task button + collapsible form ── */
  .add-task-btn {
    width: 100%;
    background: transparent;
    border: 2px dashed #cbd5e1;
    color: #64748b;
    padding: .8rem;
    border-radius: 10px;
    font-size: .875rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    margin-bottom: 1rem;
    font-family: inherit;
  }
  .add-task-btn:hover {
    border-color: #94a3b8;
    color: #334155;
    background: #f8fafc;
  }

  .btn-cancel {
    background: transparent;
    border: 1px solid #e2e8f0;
    color: #64748b;
    border-radius: 8px;
    padding: .55rem .9rem;
    font-weight: 600;
    font-size: .85rem;
    cursor: pointer;
    transition: all .15s;
  }
  .btn-cancel:hover { background: #f1f5f9; color: #334155; }

  .add-form { display: none; flex-direction: column; gap: .45rem; margin-bottom: 1rem;
    animation: task-in .2s ease;
  }
  .add-form.show { display: flex; }
  .add-form input {
    background: #ffffff;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    padding: .55rem .75rem;
    color: #1e293b;
    font-size: .875rem;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .add-form input:focus { border-color: #94a3b8; box-shadow: 0 0 0 3px rgba(148,163,184,.15); }
  .row-inputs { display: flex; gap: .45rem; }
  .row-inputs input[type="datetime-local"] { flex: 1; }
  .btn-add {
    background: linear-gradient(135deg, #0ea5e9, #8b5cf6);
    border: none;
    border-radius: 8px;
    padding: .55rem .9rem;
    color: #fff;
    font-weight: 700;
    font-size: .85rem;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
    white-space: nowrap;
  }
  .btn-add:hover  { opacity: .9; }
  .btn-add:active { transform: scale(.97); }
  .btn-add:disabled { background: #cbd5e1; cursor: not-allowed; }

  .task-list { display: flex; flex-direction: column; gap: .6rem; }

  /* Smooth in/out animation for tasks */
  @keyframes task-in {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .task-card {
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-left: 6px solid #cbd5e1;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease, background .18s ease;
  }
  .task-row {
    display: flex;
    align-items: flex-start;
    gap: .75rem;
    padding: .9rem 1rem .9rem .85rem;
  }
  .task-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(15,23,42,.08);
  }
  .task-card.completed { opacity: .45; }
  .task-card.completed .task-title { text-decoration: line-through; }

  /* ── Urgency colors (bolder + tinted backgrounds) ── */
  .task-card.urgency-overdue {
    border-left-color: #dc2626;
    background: #fee2e2;
    border-color: #fca5a5;
  }
  .task-card.urgency-overdue:hover {
    background: #fecaca;
    box-shadow: 0 6px 20px rgba(220,38,38,.25);
  }

  .task-card.urgency-today {
    border-left-color: #ea580c;
    background: #ffedd5;
    border-color: #fdba74;
  }
  .task-card.urgency-today:hover {
    background: #fed7aa;
    box-shadow: 0 6px 20px rgba(234,88,12,.22);
  }

  .task-card.urgency-tomorrow {
    border-left-color: #ca8a04;
    background: #fef9c3;
    border-color: #fde047;
  }
  .task-card.urgency-tomorrow:hover {
    background: #fef08a;
    box-shadow: 0 6px 20px rgba(202,138,4,.20);
  }

  .task-card.urgency-week {
    border-left-color: #2563eb;
    background: #dbeafe;
    border-color: #93c5fd;
  }
  .task-card.urgency-week:hover {
    background: #bfdbfe;
    box-shadow: 0 6px 20px rgba(37,99,235,.20);
  }

  .task-card.urgency-later {
    border-left-color: #94a3b8;
    background: #ffffff;
  }

  .task-check {
    margin-top: 3px; width: 18px; height: 18px;
    accent-color: #0ea5e9; cursor: pointer; flex-shrink: 0;
  }
  .task-body { flex: 1; min-width: 0; }
  .task-title {
    font-size: 1rem;
    font-weight: 600;
    color: #0f172a;
    line-height: 1.4;
    word-break: break-word;
  }
  .task-meta {
    display: flex; align-items: center; flex-wrap: wrap; gap: .5rem;
    margin-top: .35rem;
  }
  .task-due {
    display: inline-flex; align-items: center; gap: .3rem;
    font-size: .75rem; color: #64748b;
    cursor: pointer;
    padding: 1px 6px;
    border-radius: 6px;
    transition: background .15s, color .15s;
  }
  .task-due:hover { background: #f1f5f9; color: #334155; }
  .task-due.overdue-text { color: #ef4444; font-weight: 600; }
  .task-due.overdue-text:hover { background: #fef2f2; }
  /* ── Date-edit popover ── */
  .date-edit-overlay {
    position: fixed; inset: 0;
    background: rgba(15, 23, 42, .5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 150;
    padding: 1rem;
    backdrop-filter: blur(4px);
  }
  .date-edit-overlay[hidden] { display: none; }
  .date-edit-panel {
    background: #ffffff;
    border-radius: 14px;
    padding: 1.5rem;
    max-width: 460px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
    animation: task-in .2s ease;
  }
  .date-edit-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: #0f172a;
    margin-bottom: .35rem;
  }
  .date-edit-task-name {
    font-size: .875rem;
    color: #64748b;
    margin-bottom: 1rem;
    word-break: break-word;
  }
  .date-edit-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 1rem;
    flex-wrap: wrap;
    gap: .5rem;
  }
  .btn-clear-date {
    background: transparent;
    border: 1px solid #fca5a5;
    color: #dc2626;
    border-radius: 8px;
    padding: .55rem .9rem;
    font-weight: 600;
    font-size: .85rem;
    cursor: pointer;
  }
  .btn-clear-date:hover { background: #fef2f2; }

  /* ── Comment / notes thread ── */
  .task-comment-toggle {
    display: inline-flex;
    align-items: center;
    gap: .25rem;
    font-size: .72rem;
    color: #475569;
    background: #f1f5f9;
    padding: 2px 9px;
    border-radius: 999px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    font-family: inherit;
    transition: all .15s;
  }
  .task-comment-toggle:hover {
    background: #e2e8f0;
    color: #0f172a;
  }
  .task-comment-toggle.has-comments {
    background: #dbeafe;
    color: #1e40af;
    border-color: #93c5fd;
  }
  .task-comment-toggle.has-comments:hover { background: #bfdbfe; }

  .task-comments {
    padding: .75rem 1rem .9rem .85rem;
    border-top: 1px dashed rgba(15, 23, 42, .12);
  }
  .comment-list {
    display: flex;
    flex-direction: column;
    gap: .5rem;
    margin-bottom: .65rem;
  }
  .comment-item {
    background: rgba(255,255,255,.75);
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: .55rem .7rem;
    position: relative;
  }
  .comment-text {
    font-size: .85rem;
    color: #1e293b;
    line-height: 1.45;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .comment-meta {
    display: flex;
    align-items: center;
    gap: .35rem;
    margin-top: .25rem;
    font-size: .7rem;
    color: #94a3b8;
  }
  .comment-author { font-weight: 600; color: #64748b; }
  .btn-delete-comment {
    position: absolute;
    top: 4px;
    right: 6px;
    background: none;
    border: none;
    color: #cbd5e1;
    cursor: pointer;
    font-size: .9rem;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color .15s;
  }
  .btn-delete-comment:hover { color: #ef4444; }
  .comment-input-row {
    display: flex;
    gap: .35rem;
  }
  .comment-input {
    flex: 1;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    padding: .5rem .65rem;
    font-size: .85rem;
    font-family: inherit;
    color: #1e293b;
    outline: none;
    background: #ffffff;
  }
  .comment-input:focus {
    border-color: #94a3b8;
    box-shadow: 0 0 0 3px rgba(148,163,184,.15);
  }
  .btn-add-comment {
    background: linear-gradient(135deg, #0ea5e9, #8b5cf6);
    border: none;
    border-radius: 8px;
    padding: 0 .85rem;
    color: #fff;
    font-weight: 700;
    font-size: .8rem;
    cursor: pointer;
    transition: opacity .15s;
  }
  .btn-add-comment:hover  { opacity: .9; }
  .btn-add-comment:active { transform: scale(.97); }

  /* ── Hover-revealed actions ── */
  .task-actions {
    display: flex;
    align-items: flex-start;
    gap: 2px;
    flex-shrink: 0;
    opacity: 0;
    transform: translateX(6px);
    transition: opacity .15s ease, transform .15s ease;
  }
  .task-card:hover .task-actions,
  .task-card:focus-within .task-actions {
    opacity: 1;
    transform: translateX(0);
  }
  @media (max-width: 768px) {
    .task-actions { opacity: 1; transform: translateX(0); }
  }
  .task-by {
    font-size: .7rem;
    color: #94a3b8;
    background: #f8fafc;
    padding: 2px 7px;
    border-radius: 999px;
    font-weight: 500;
  }

  .assign-select, .date-select, .time-select {
    background: #ffffff;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    padding: .55rem .55rem;
    color: #1e293b;
    font-size: .85rem;
    outline: none;
    cursor: pointer;
    font-family: inherit;
    flex: 1;
    min-width: 0;
  }
  .assign-select:focus, .date-select:focus, .time-select:focus {
    border-color: #94a3b8; box-shadow: 0 0 0 3px rgba(148,163,184,.15);
  }
  .date-select.has-value, .time-select.has-value {
    border-color: #0ea5e9; color: #0369a1; font-weight: 600;
  }

  /* ── Custom dropdown (used for the time picker) ── */
  .dropdown {
    position: relative;
    flex: 1;
    min-width: 0;
  }
  .dropdown-trigger {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: .35rem;
  }
  .dd-label {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .dd-caret { color: #94a3b8; font-size: .7rem; flex-shrink: 0; }

  .dropdown-menu {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    max-height: 240px;
    overflow-y: auto;
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    box-shadow: 0 10px 30px rgba(0,0,0,.15);
    z-index: 50;
    padding: .25rem;
  }
  .dropdown-item {
    display: block;
    width: 100%;
    background: none;
    border: none;
    padding: .5rem .65rem;
    text-align: left;
    font-size: .85rem;
    color: #334155;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
  }
  .dropdown-item:hover { background: #f1f5f9; }
  .dropdown-item.selected { background: #e0f2fe; color: #0369a1; font-weight: 600; }

  .custom-datetime {
    margin-top: .45rem;
    width: 100%;
    background: #fffbeb;
    border: 1px solid #fbbf24;
    border-radius: 8px;
    padding: .55rem .75rem;
    font-size: .85rem;
    outline: none;
    color: #1e293b;
  }

  .task-assignee {
    font-size: .7rem;
    padding: 2px 8px;
    border-radius: 999px;
    font-weight: 700;
  }
  .task-assignee.matt   { background: #e0f2fe; color: #0369a1; }
  .task-assignee.moe    { background: #ede9fe; color: #6d28d9; }
  .task-assignee.efrain { background: #fef3c7; color: #92400e; }
  .btn-delete {
    background: none; border: none; color: #cbd5e1;
    cursor: pointer; font-size: 1.15rem; padding: 1px 4px;
    border-radius: 4px; transition: color .15s; flex-shrink: 0; line-height: 1;
  }
  .btn-delete:hover { color: #ef4444; }

  .btn-edit {
    background: none; border: none; color: #cbd5e1;
    cursor: pointer; font-size: .85rem; padding: 2px 4px;
    border-radius: 4px; transition: color .15s; flex-shrink: 0; line-height: 1;
  }
  .btn-edit:hover { color: #0ea5e9; }

  .task-edit-input {
    width: 100%;
    background: #fffbeb;
    border: 1px solid #fbbf24;
    border-radius: 6px;
    padding: .35rem .5rem;
    font-size: .9rem;
    color: #1e293b;
    font-family: inherit;
    outline: none;
  }
  .task-edit-input:focus { box-shadow: 0 0 0 3px rgba(251,191,36,.2); }

  .move-btns {
    display: flex; flex-direction: column; gap: 1px;
    flex-shrink: 0; margin-top: 1px;
  }
  .btn-move {
    background: none; border: none; color: #cbd5e1;
    cursor: pointer; font-size: .7rem; padding: 1px 4px;
    border-radius: 3px; line-height: 1;
    transition: color .15s, background .15s;
  }
  .btn-move:hover:not(:disabled) { color: #0ea5e9; background: #f1f5f9; }
  .btn-move:disabled { opacity: .25; cursor: not-allowed; }

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
  import {
    getDatabase, ref, onValue, push, update, remove, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";

  const STORAGE_NAME = 'display_name_v1';
  const STORAGE_NOTIF  = 'notified_ids_v1';

  let currentUser = null;

  // ── Boot: no login required — just pick a name once ──
  const HARDCODED_CONFIG = {
    apiKey: "AIzaSyCI_r-Aqx5kuWGhnzyCQjJK3-fhOLkB8L0",
    authDomain: "matt-moe-tasks.firebaseapp.com",
    databaseURL: "https://matt-moe-tasks-default-rtdb.firebaseio.com",
    projectId: "matt-moe-tasks",
    storageBucket: "matt-moe-tasks.firebasestorage.app",
    messagingSenderId: "1070251285882",
    appId: "1:1070251285882:web:fe66d894065d14b24c8ac3"
  };

  const app      = initializeApp(HARDCODED_CONFIG);
  const db       = getDatabase(app);
  const tasksRef = ref(db, 'tasks');

  // Boot straight into the app — no login needed
  currentUser = { displayName: 'Lumin Team', uid: 'team' };
  showApp();
  subscribeTasks();

  // Auth screens removed — app boots directly

  function showApp() {
    document.getElementById('notif-btn').style.display = 'inline-block';
    document.getElementById('display-name-input').value = currentUser.displayName;
    document.getElementById('sync-badge').classList.remove('offline');
    document.getElementById('sync-text').textContent = 'Live sync active';
    updateNotifBadge();
  }

  let _prevTasksById = null;

  function subscribeTasks() {
    onValue(tasksRef, snap => {
      const data = snap.val() || {};
      const newTasks = Object.entries(data).map(([id, t]) => ({ id, ...t }));

      // Detect tasks that just got marked completed by someone else → notify
      if (_prevTasksById !== null && 'Notification' in window && Notification.permission === 'granted') {
        newTasks.forEach(t => {
          const prev = _prevTasksById[t.id];
          if (prev && !prev.completed && t.completed
              && t.completedByUid && t.completedByUid !== currentUser.uid) {
            const label = t.owner === 'matt' ? 'For Matt'
                        : t.owner === 'moe'  ? 'For Moe'
                        : 'General Tasks';
            new Notification(`✅ ${t.completedBy || 'Someone'} finished a task`, {
              body: `${t.title}\n${label}`,
              tag: 'completed:' + t.id
            });
          }
        });
      }

      _prevTasksById = {};
      newTasks.forEach(t => { _prevTasksById[t.id] = t; });

      window._tasks = newTasks;
      render();
      checkDueReminders();
    }, err => {
      console.error('DB error:', err);
      document.getElementById('sync-text').textContent = 'Sync error — check rules';
    });
  }

  // Auth handlers removed

  // ── Settings modal handlers ──
  window.openSettings = () => {
    document.getElementById('settings-modal').classList.add('show');
    document.getElementById('display-name-input').value = currentUser ? currentUser.displayName : '';
  };
  window.closeSettings = () => {
    document.getElementById('settings-modal').classList.remove('show');
  };
  window.saveDisplayName = () => {
    const name = document.getElementById('display-name-input').value.trim();
    if (!name) return;
    localStorage.setItem(STORAGE_NAME, name);
    currentUser = { displayName: name, uid: name };
    closeSettings();
  };
  window.clearConfig = () => {
    if (!confirm('Disconnect from Firebase on this device?')) return;
    localStorage.removeItem('firebase_config_v1');
    location.reload();
  };
  window.saveConfig = () => {
    const raw = document.getElementById('config-input').value.trim();
    const err = document.getElementById('config-err');
    err.classList.remove('show');
    let parsed;
    try {
      let body = raw.trim()
        .replace(/\[([^\]]+)\]\(https?:\/\/[^)]+\)/g, '$1');  // strip markdown links
      const start = body.indexOf('{');
      const end   = body.lastIndexOf('}');
      if (start === -1 || end === -1) throw new Error('no object literal');
      const objText = body.slice(start, end + 1);
      // Parse as a JS object literal (handles unquoted keys, single quotes, trailing commas)
      parsed = (new Function('return ' + objText))();
    } catch {
      err.textContent = '⚠ Could not parse the config. Paste the full firebaseConfig object.';
      err.classList.add('show');
      return;
    }
    if (!parsed.apiKey || !parsed.databaseURL) {
      err.textContent = '⚠ Missing apiKey or databaseURL. Make sure Realtime Database is enabled.';
      err.classList.add('show');
      return;
    }
    localStorage.setItem(STORAGE_CONFIG, JSON.stringify(parsed));
    location.reload();
  };

  // ── Task ops (exposed) ──
  window.addTask = (e, owner) => {
    e.preventDefault();
    if (!currentUser || !tasksRef) return false;
    const titleEl = document.getElementById('input-' + owner);
    const dateEl  = document.getElementById('date-' + owner);
    const title = titleEl.value.trim();
    const due   = dateEl.value || null;
    if (!title) return false;
    const by = currentUser.displayName || localStorage.getItem(STORAGE_NAME) || currentUser.email.split('@')[0];

    // For general tasks, read the assignee dropdown
    let assignedTo = null;
    if (owner === 'general') {
      const assignEl = document.getElementById('assign-general');
      const v = assignEl ? assignEl.value : '';
      if (v === 'matt')        assignedTo = 'matt';
      else if (v === 'moe')    assignedTo = 'moe';
      else if (v === 'efrain') assignedTo = 'efrain';
      if (assignEl) assignEl.value = '';
    }

    push(tasksRef, {
      owner, title, due,
      completed: false,
      createdBy: by,
      createdByUid: currentUser.uid,
      created: serverTimestamp(),
      order: Date.now(),
      assignedTo,
      assignedToName: assignedTo === 'efrain' ? 'Efrain'
                    : assignedTo === 'matt'   ? 'Matt'
                    : assignedTo === 'moe'    ? 'Moe'
                    : null
    });

    // Collapse the add form after successful submit
    cancelAddForm(owner);

    // Reset date + time pickers
    const dSel = document.getElementById('date-sel-' + owner);
    const tHid = document.getElementById('time-sel-' + owner);
    const tDD  = document.getElementById('time-dd-'  + owner);
    const tMenu = document.getElementById('time-menu-' + owner);
    const cust = document.getElementById('date-custom-' + owner);
    if (dSel) { dSel.value = ''; dSel.classList.remove('has-value'); }
    if (tHid) tHid.value = '';
    if (tDD) {
      const trig = tDD.querySelector('.dropdown-trigger');
      const lbl  = trig && trig.querySelector('.dd-label');
      if (lbl)  lbl.textContent = 'Time…';
      if (trig) trig.classList.remove('has-value');
    }
    if (tMenu) tMenu.querySelectorAll('.dropdown-item').forEach(it => it.classList.remove('selected'));
    if (cust) { cust.value = ''; cust.hidden = true; }
    titleEl.value = ''; dateEl.value = '';
    return false;
  };
  window.toggleTask = id => {
    const t = window._tasks.find(t => t.id === id);
    if (!t || !db) return;
    const becomingComplete = !t.completed;
    const updates = { completed: becomingComplete };
    if (becomingComplete) {
      updates.completedBy    = currentUser.displayName || localStorage.getItem(STORAGE_NAME) || currentUser.email.split('@')[0];
      updates.completedByUid = currentUser.uid;
      updates.completedAt    = serverTimestamp();
    } else {
      updates.completedBy    = null;
      updates.completedByUid = null;
      updates.completedAt    = null;
    }
    update(ref(db, 'tasks/' + id), updates);
  };
  window.deleteTask = id => {
    if (db) remove(ref(db, 'tasks/' + id));
  };

  // ── Date + Time pickers ──
  function localDateStr(d) {
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  }

  function populateDateSelects() {
    const today = new Date();
    today.setHours(0,0,0,0);
    const labels = ['Today', 'Tomorrow'];
    const opts = [{ value: '', label: 'Date…' }];
    for (let i = 0; i < 5; i++) {
      const d = new Date(today);
      d.setDate(today.getDate() + i);
      const dateStr = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
      const label = labels[i] ? `${labels[i]} (${dateStr})` : dateStr;
      opts.push({ value: localDateStr(d), label });
    }
    opts.push({ value: 'custom', label: '✏️ Pick a specific date…' });

    ['matt','moe','general'].forEach(owner => {
      const sel = document.getElementById('date-sel-' + owner);
      if (!sel) return;
      const previous = sel.value;
      sel.innerHTML = '';
      opts.forEach(o => {
        const opt = document.createElement('option');
        opt.value = o.value;
        opt.textContent = o.label;
        sel.appendChild(opt);
      });
      if (previous && [...sel.options].some(o => o.value === previous)) sel.value = previous;
    });
  }

  function populateTimeSelects() {
    const opts = [];
    for (let h = 0; h < 24; h++) {
      for (let m = 0; m < 60; m += 15) {
        const period = h >= 12 ? 'PM' : 'AM';
        const h12 = h % 12 === 0 ? 12 : h % 12;
        const mm  = String(m).padStart(2, '0');
        const hh  = String(h).padStart(2, '0');
        opts.push({ value: `${hh}:${mm}`, label: `${h12}:${mm} ${period}` });
      }
    }
    ['matt','moe','general'].forEach(owner => {
      const menu = document.getElementById('time-menu-' + owner);
      if (!menu) return;
      menu.innerHTML = '';
      // "Clear" option at the top
      const clearBtn = document.createElement('button');
      clearBtn.type = 'button';
      clearBtn.className = 'dropdown-item';
      clearBtn.textContent = 'No time';
      clearBtn.style.color = '#94a3b8';
      clearBtn.addEventListener('click', () => selectTime(owner, '', 'Time…'));
      menu.appendChild(clearBtn);
      opts.forEach(o => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'dropdown-item';
        btn.dataset.value = o.value;
        btn.textContent = o.label;
        btn.addEventListener('click', () => selectTime(owner, o.value, o.label));
        menu.appendChild(btn);
      });
    });
  }

  window.selectTime = (owner, value, label) => {
    const hidden  = document.getElementById('time-sel-'  + owner);
    const dd      = document.getElementById('time-dd-'   + owner);
    const menu    = document.getElementById('time-menu-' + owner);
    if (!hidden || !dd || !menu) return;
    hidden.value = value;
    const trigger = dd.querySelector('.dropdown-trigger');
    const labelEl = trigger.querySelector('.dd-label');
    labelEl.textContent = label;
    trigger.classList.toggle('has-value', !!value);
    // Mark item as selected
    menu.querySelectorAll('.dropdown-item').forEach(it => {
      it.classList.toggle('selected', it.dataset.value === value && !!value);
    });
    menu.hidden = true;
    handleDateTimeChange(owner);
  };

  window.toggleTimeMenu = (owner, evt) => {
    if (evt) evt.stopPropagation();
    // Close all other open menus
    document.querySelectorAll('.dropdown-menu').forEach(m => {
      if (m.id !== 'time-menu-' + owner) m.hidden = true;
    });
    const menu = document.getElementById('time-menu-' + owner);
    if (!menu) return;
    menu.hidden = !menu.hidden;
    if (!menu.hidden) {
      // Auto-scroll to selected (or to ~9am if nothing selected) so the user lands somewhere useful
      const selected = menu.querySelector('.dropdown-item.selected');
      const fallback = menu.querySelector('.dropdown-item[data-value="09:00"]');
      const target = selected || fallback;
      if (target) target.scrollIntoView({ block: 'center' });
    }
  };

  // Close any open dropdown when clicking outside it
  document.addEventListener('click', e => {
    if (!e.target.closest('.dropdown')) {
      document.querySelectorAll('.dropdown-menu').forEach(m => m.hidden = true);
    }
  });

  window.handleDateTimeChange = (owner) => {
    const dateSel    = document.getElementById('date-sel-' + owner);
    const timeSel    = document.getElementById('time-sel-' + owner);
    const customDate = document.getElementById('date-custom-' + owner);
    const target     = document.getElementById('date-' + owner);
    if (!dateSel || !timeSel || !target) return;

    let dateVal = dateSel.value;

    if (dateVal === 'custom') {
      customDate.hidden = false;
      customDate.focus();
      dateSel.classList.add('has-value');
      // We'll wait for the customDate change to set target. Do nothing yet.
      if (customDate.value) dateVal = customDate.value;
      else { target.value = ''; return; }
    } else {
      customDate.hidden = true;
      if (customDate.value && dateVal && dateVal !== customDate.value) customDate.value = '';
    }

    // Mark selects as has-value when populated
    dateSel.classList.toggle('has-value', !!dateVal);
    timeSel.classList.toggle('has-value', !!timeSel.value);

    if (!dateVal && !timeSel.value) {
      target.value = '';
      return;
    }

    // Defaults: missing date → today; missing time → 9:00
    const finalDate = dateVal || localDateStr(new Date());
    const finalTime = timeSel.value || '09:00';
    target.value = `${finalDate}T${finalTime}`;
  };

  // Init pickers on load
  populateDateSelects();
  populateTimeSelects();

  // ── Add-form toggle (hidden by default, shown on button click) ──
  window.toggleAddForm = (owner) => {
    const form = document.getElementById('add-form-' + owner);
    const btn  = document.getElementById('add-btn-'  + owner);
    if (!form || !btn) return;
    const showing = form.classList.contains('show');
    if (showing) {
      cancelAddForm(owner);
    } else {
      form.classList.add('show');
      btn.style.display = 'none';
      const titleEl = document.getElementById('input-' + owner);
      if (titleEl) setTimeout(() => titleEl.focus(), 30);
    }
  };
  window.cancelAddForm = (owner) => {
    const form = document.getElementById('add-form-' + owner);
    const btn  = document.getElementById('add-btn-'  + owner);
    if (!form || !btn) return;
    form.classList.remove('show');
    btn.style.display = '';
    // Clear inputs
    const titleEl = document.getElementById('input-' + owner);
    const dHid    = document.getElementById('date-' + owner);
    const dSel    = document.getElementById('date-sel-' + owner);
    const tHid    = document.getElementById('time-sel-' + owner);
    const tDD     = document.getElementById('time-dd-'  + owner);
    const cust    = document.getElementById('date-custom-' + owner);
    if (titleEl) titleEl.value = '';
    if (dHid) dHid.value = '';
    if (dSel) { dSel.value = ''; dSel.classList.remove('has-value'); }
    if (tHid) tHid.value = '';
    if (tDD) {
      const trig = tDD.querySelector('.dropdown-trigger');
      const lbl  = trig && trig.querySelector('.dd-label');
      if (lbl) lbl.textContent = 'Time…';
      if (trig) trig.classList.remove('has-value');
    }
    if (cust) { cust.value = ''; cust.hidden = true; }
    if (owner === 'general') {
      const aSel = document.getElementById('assign-general');
      if (aSel) aSel.value = '';
    }
  };

  // ── Comments / notes ──
  window.toggleComments = (id) => {
    if (!window._expandedTaskIds) window._expandedTaskIds = new Set();
    const wasOpen = window._expandedTaskIds.has(id);
    if (wasOpen) {
      window._expandedTaskIds.delete(id);
    } else {
      window._expandedTaskIds.add(id);
    }
    if (typeof render === 'function') render();
    if (!wasOpen) {
      // Focus the input on open
      setTimeout(() => {
        const el = document.getElementById('comment-input-' + id);
        if (el) el.focus();
      }, 30);
    }
  };

  window.submitComment = (id) => {
    const input = document.getElementById('comment-input-' + id);
    if (!input || !db || !currentUser) return;
    const text = input.value.trim();
    if (!text) return;
    const author = currentUser.displayName || localStorage.getItem(STORAGE_NAME) || currentUser.email.split('@')[0];
    push(ref(db, `tasks/${id}/comments`), {
      text,
      author,
      authorUid: currentUser.uid,
      time: serverTimestamp()
    });
    if (window._commentDrafts) delete window._commentDrafts[id];
    input.value = '';
    setTimeout(() => {
      const el = document.getElementById('comment-input-' + id);
      if (el) el.focus();
    }, 30);
  };

  window.deleteComment = (taskId, commentId) => {
    if (!db) return;
    if (!confirm('Delete this note?')) return;
    remove(ref(db, `tasks/${taskId}/comments/${commentId}`));
  };

  // ── Edit task date popover (Date dropdown + Time dropdown) ──
  function populateEditDateSelect(presetISO) {
    const sel = document.getElementById('edit-date-sel');
    if (!sel) return;
    sel.innerHTML = '';
    const today = new Date();
    today.setHours(0,0,0,0);
    const labels = ['Today', 'Tomorrow'];
    const opts = [{ value: '', label: 'Date…' }];
    for (let i = 0; i < 5; i++) {
      const d = new Date(today);
      d.setDate(today.getDate() + i);
      const dateStr = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
      const label = labels[i] ? `${labels[i]} (${dateStr})` : dateStr;
      opts.push({ value: localDateStr(d), label });
    }
    opts.push({ value: 'custom', label: '✏️ Pick a specific date…' });

    opts.forEach(o => {
      const opt = document.createElement('option');
      opt.value = o.value;
      opt.textContent = o.label;
      sel.appendChild(opt);
    });

    if (presetISO) {
      // If the preset date matches one of today/tomorrow/+2/+3/+4, select it; otherwise custom
      const presetDateOnly = presetISO.slice(0, 10);
      const found = [...sel.options].some(o => o.value === presetDateOnly);
      if (found) {
        sel.value = presetDateOnly;
        sel.classList.add('has-value');
      } else {
        sel.value = 'custom';
        const cust = document.getElementById('edit-date-custom');
        cust.value = presetDateOnly;
        cust.hidden = false;
        sel.classList.add('has-value');
      }
    } else {
      sel.classList.remove('has-value');
    }
  }

  function populateEditTimeMenu(presetTime) {
    const menu = document.getElementById('edit-time-menu');
    if (!menu) return;
    menu.innerHTML = '';
    // Clear option
    const clearBtn = document.createElement('button');
    clearBtn.type = 'button';
    clearBtn.className = 'dropdown-item';
    clearBtn.textContent = 'No time';
    clearBtn.style.color = '#94a3b8';
    clearBtn.addEventListener('click', () => selectEditTime('', 'Time…'));
    menu.appendChild(clearBtn);

    let selectedLabel = 'Time…';
    for (let h = 0; h < 24; h++) {
      for (let m = 0; m < 60; m += 15) {
        const period = h >= 12 ? 'PM' : 'AM';
        const h12 = h % 12 === 0 ? 12 : h % 12;
        const mm = String(m).padStart(2, '0');
        const hh = String(h).padStart(2, '0');
        const value = `${hh}:${mm}`;
        const label = `${h12}:${mm} ${period}`;
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'dropdown-item';
        btn.dataset.value = value;
        btn.textContent = label;
        btn.addEventListener('click', () => selectEditTime(value, label));
        if (presetTime && presetTime.startsWith(value)) {
          btn.classList.add('selected');
          selectedLabel = label;
        }
        menu.appendChild(btn);
      }
    }
    // Reflect preset on the trigger
    const dd = document.getElementById('edit-time-dd');
    const trig = dd && dd.querySelector('.dropdown-trigger');
    const lbl = trig && trig.querySelector('.dd-label');
    const hidden = document.getElementById('edit-time-sel');
    if (hidden) hidden.value = presetTime || '';
    if (lbl) lbl.textContent = selectedLabel;
    if (trig) trig.classList.toggle('has-value', !!presetTime);
  }

  window.toggleEditTimeMenu = (evt) => {
    if (evt) evt.stopPropagation();
    document.querySelectorAll('.dropdown-menu').forEach(m => {
      if (m.id !== 'edit-time-menu') m.hidden = true;
    });
    const menu = document.getElementById('edit-time-menu');
    if (!menu) return;
    menu.hidden = !menu.hidden;
    if (!menu.hidden) {
      const sel = menu.querySelector('.dropdown-item.selected');
      const fb  = menu.querySelector('.dropdown-item[data-value="09:00"]');
      const target = sel || fb;
      if (target) target.scrollIntoView({ block: 'center' });
    }
  };

  window.selectEditTime = (value, label) => {
    const hidden = document.getElementById('edit-time-sel');
    const dd     = document.getElementById('edit-time-dd');
    const menu   = document.getElementById('edit-time-menu');
    if (!hidden || !dd || !menu) return;
    hidden.value = value;
    const trig = dd.querySelector('.dropdown-trigger');
    const lbl  = trig.querySelector('.dd-label');
    lbl.textContent = label;
    trig.classList.toggle('has-value', !!value);
    menu.querySelectorAll('.dropdown-item').forEach(it => {
      it.classList.toggle('selected', it.dataset.value === value && !!value);
    });
    menu.hidden = true;
    handleEditDateTimeChange();
  };

  window.handleEditDateTimeChange = () => {
    const dateSel    = document.getElementById('edit-date-sel');
    const timeHidden = document.getElementById('edit-time-sel');
    const customDate = document.getElementById('edit-date-custom');
    const target     = document.getElementById('edit-date-target');
    if (!dateSel || !timeHidden || !target) return;

    let dateVal = dateSel.value;
    if (dateVal === 'custom') {
      customDate.hidden = false;
      customDate.focus();
      dateSel.classList.add('has-value');
      if (customDate.value) dateVal = customDate.value;
      else { target.value = ''; return; }
    } else {
      customDate.hidden = true;
    }
    dateSel.classList.toggle('has-value', !!dateVal);

    if (!dateVal && !timeHidden.value) { target.value = ''; return; }
    const finalDate = dateVal || localDateStr(new Date());
    const finalTime = timeHidden.value || '09:00';
    target.value = `${finalDate}T${finalTime}`;
  };

  window.editTaskDate = (id) => {
    const t = window._tasks.find(x => x.id === id);
    if (!t) return;
    document.getElementById('edit-task-id').value = id;
    document.getElementById('date-edit-task-name').textContent = t.title;
    document.getElementById('edit-date-target').value = t.due || '';
    const cust = document.getElementById('edit-date-custom');
    cust.hidden = true;
    cust.value = '';

    const dueISO = t.due || '';
    const datePart = dueISO ? dueISO.slice(0, 10) : '';
    const timePart = dueISO && dueISO.includes('T') ? dueISO.slice(11, 16) : '';
    populateEditDateSelect(dueISO);
    populateEditTimeMenu(timePart);

    document.getElementById('date-edit-overlay').hidden = false;
  };

  window.closeDateEdit = (evt) => {
    if (evt && evt.target.id !== 'date-edit-overlay') return;
    document.getElementById('date-edit-overlay').hidden = true;
    document.getElementById('edit-time-menu').hidden = true;
  };

  // Close the date-edit popover on Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      const overlay = document.getElementById('date-edit-overlay');
      if (overlay && !overlay.hidden) {
        overlay.hidden = true;
        document.getElementById('edit-time-menu').hidden = true;
      }
    }
  });

  window.clearDateEdit = () => {
    const id = document.getElementById('edit-task-id').value;
    if (!id || !db) return;
    update(ref(db, 'tasks/' + id), { due: null });
    document.getElementById('date-edit-overlay').hidden = true;
  };

  window.saveDateEdit = () => {
    const id     = document.getElementById('edit-task-id').value;
    const newDue = document.getElementById('edit-date-target').value || null;
    if (!id || !db) return;
    update(ref(db, 'tasks/' + id), { due: newDue });
    document.getElementById('date-edit-overlay').hidden = true;
  };

  window.editTask = (id) => {
    const card = document.querySelector(`[data-task-id="${id}"]`);
    if (!card) return;
    const titleEl = card.querySelector('.task-title');
    if (!titleEl || titleEl.querySelector('input')) return;
    const oldText = titleEl.textContent;
    const input = document.createElement('input');
    input.type = 'text';
    input.value = oldText;
    input.className = 'task-edit-input';
    titleEl.innerHTML = '';
    titleEl.appendChild(input);
    input.focus();
    input.select();

    let saved = false;
    const finish = (commit) => {
      if (saved) return;
      saved = true;
      const newText = input.value.trim();
      if (commit && newText && newText !== oldText) {
        if (db) update(ref(db, 'tasks/' + id), { title: newText });
      } else {
        titleEl.textContent = oldText;
      }
    };
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter')  { e.preventDefault(); finish(true); }
      if (e.key === 'Escape') { e.preventDefault(); finish(false); }
    });
    input.addEventListener('blur', () => finish(true));
  };

  window.moveTask = (id, direction) => {
    if (!db) return;
    const t = window._tasks.find(x => x.id === id);
    if (!t) return;
    const siblings = window._tasks
      .filter(s => s.owner === t.owner && !s.completed)
      .sort((a, b) => (a.order || 0) - (b.order || 0));
    const idx = siblings.findIndex(s => s.id === id);
    const targetIdx = direction === 'up' ? idx - 1 : idx + 1;
    if (targetIdx < 0 || targetIdx >= siblings.length) return;
    const other = siblings[targetIdx];
    const myOrder    = t.order ?? Date.now();
    const otherOrder = other.order ?? Date.now();
    update(ref(db, 'tasks/' + t.id),     { order: otherOrder });
    update(ref(db, 'tasks/' + other.id), { order: myOrder });
  };

  // ── Notifications ──
  window.toggleNotifications = async () => {
    if (!('Notification' in window)) {
      alert('Your browser does not support notifications');
      return;
    }
    if (Notification.permission === 'granted') {
      alert('Notifications are already enabled.\n\nTo disable, change notification permissions for this site in your browser settings.');
      return;
    }
    if (Notification.permission === 'denied') {
      alert('Notifications are blocked. Please enable them in your browser site settings.');
      return;
    }
    const result = await Notification.requestPermission();
    updateNotifBadge();
    if (result === 'granted') {
      new Notification('🔔 Reminders enabled!', {
        body: 'You\'ll be reminded 5 minutes before each task is due.',
      });
    }
  };

  function updateNotifBadge() {
    const btn = document.getElementById('notif-btn');
    if (!('Notification' in window)) { btn.style.display = 'none'; return; }
    if (Notification.permission === 'granted') {
      btn.classList.add('enabled');
      btn.textContent = '🔔 Reminders on';
    } else if (Notification.permission === 'denied') {
      btn.textContent = '🔕 Reminders blocked';
    } else {
      btn.classList.remove('enabled');
      btn.textContent = '🔔 Enable reminders';
    }
  }

  function getNotified() {
    try { return new Set(JSON.parse(localStorage.getItem(STORAGE_NOTIF) || '[]')); }
    catch { return new Set(); }
  }
  function markNotified(id, kind) {
    const s = getNotified();
    s.add(id + ':' + kind);
    localStorage.setItem(STORAGE_NOTIF, JSON.stringify([...s]));
  }

  function checkDueReminders() {
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    const now = Date.now();
    const notified = getNotified();
    const myName = (currentUser && (currentUser.displayName || localStorage.getItem(STORAGE_NAME))) || '';

    (window._tasks || []).forEach(t => {
      if (t.completed || !t.due) return;
      const dueMs = new Date(t.due).getTime();
      const diff  = dueMs - now;

      // 5-minute warning
      if (diff > 0 && diff <= 5 * 60 * 1000 && !notified.has(t.id + ':soon')) {
        new Notification(`⏰ Due in ${Math.ceil(diff / 60000)} min: ${t.title}`, {
          body: `Assigned to ${cap(t.owner)}${t.createdBy ? ' · by ' + t.createdBy : ''}`,
          tag: t.id + ':soon'
        });
        markNotified(t.id, 'soon');
      }

      // Now / overdue (within last 5 min) — fire once
      if (diff <= 0 && diff > -5 * 60 * 1000 && !notified.has(t.id + ':now')) {
        new Notification(`🚨 Now due: ${t.title}`, {
          body: `Assigned to ${cap(t.owner)}${t.createdBy ? ' · by ' + t.createdBy : ''}`,
          tag: t.id + ':now'
        });
        markNotified(t.id, 'now');
      }
    });
  }
  function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

  // Run check every 30s
  setInterval(checkDueReminders, 30000);
</script>

<script>
  window._tasks = window._tasks || [];

  function formatDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleString('en-US', {
      month: 'short', day: 'numeric',
      hour: 'numeric', minute: '2-digit'
    });
  }
  function isOverdue(due, completed) {
    if (completed) return false;
    return new Date(due) < new Date();
  }

  function getUrgency(t) {
    if (t.completed) return 'later';
    if (!t.due) return 'later';
    const due = new Date(t.due);
    const now = new Date();
    if (due < now) return 'overdue';
    const today = new Date(); today.setHours(0,0,0,0);
    const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate() + 1);
    const dayAfter = new Date(tomorrow); dayAfter.setDate(dayAfter.getDate() + 1);
    const week     = new Date(today); week.setDate(week.getDate() + 7);
    if (due < tomorrow) return 'today';
    if (due < dayAfter) return 'tomorrow';
    if (due < week)     return 'week';
    return 'later';
  }
  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = String(str || '');
    return d.innerHTML;
  }

  // ── Comment helpers ──
  window._expandedTaskIds = window._expandedTaskIds || new Set();
  window._commentDrafts   = window._commentDrafts   || {};

  function taskComments(t) {
    if (!t || !t.comments) return [];
    return Object.entries(t.comments)
      .map(([id, c]) => ({ id, ...c }))
      .sort((a, b) => (a.time || 0) - (b.time || 0));
  }

  function formatRelativeTime(ms) {
    if (!ms) return '';
    const diff = Date.now() - ms;
    if (diff < 0) return 'just now';
    if (diff < 60_000)        return 'just now';
    if (diff < 3_600_000)     return Math.floor(diff/60_000) + 'm ago';
    if (diff < 86_400_000)    return Math.floor(diff/3_600_000) + 'h ago';
    if (diff < 604_800_000)   return Math.floor(diff/86_400_000) + 'd ago';
    return new Date(ms).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function renderCommentSection(taskId, comments) {
    const draft = window._commentDrafts[taskId] || '';
    const list = comments.length === 0 ? '' : `
      <div class="comment-list">
        ${comments.map(c => `
          <div class="comment-item" data-comment-id="${c.id}">
            <div class="comment-text">${escapeHtml(c.text)}</div>
            <div class="comment-meta">
              <span class="comment-author">${escapeHtml(c.author || 'Someone')}</span>
              ${c.time ? '· ' + formatRelativeTime(c.time) : ''}
            </div>
            <button class="btn-delete-comment"
              onclick="deleteComment('${taskId}','${c.id}')"
              title="Delete note">×</button>
          </div>
        `).join('')}
      </div>`;
    return `
      <div class="task-comments" onclick="event.stopPropagation()">
        ${list}
        <div class="comment-input-row">
          <input type="text" class="comment-input"
            id="comment-input-${taskId}"
            placeholder="Add a note or progress update…"
            value="${escapeHtml(draft)}"
            oninput="window._commentDrafts['${taskId}'] = this.value"
            onkeydown="if (event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); submitComment('${taskId}'); }">
          <button class="btn-add-comment" onclick="submitComment('${taskId}')">Add</button>
        </div>
      </div>`;
  }
  function render() {
    // Preserve focus + selection on the comment input across re-renders
    const focused = document.activeElement;
    let focusInfo = null;
    if (focused && focused.classList && focused.classList.contains('comment-input')) {
      focusInfo = {
        id:    focused.id,
        start: focused.selectionStart,
        end:   focused.selectionEnd
      };
    }

    // Active board: only show non-completed tasks
    ['matt', 'moe', 'general'].forEach(owner => {
      const activeTasks = (window._tasks || [])
        .filter(t => t.owner === owner && !t.completed)
        .sort((a, b) => (a.order || 0) - (b.order || 0));

      document.getElementById('count-' + owner).textContent = activeTasks.length;

      const list = document.getElementById('list-' + owner);
      if (activeTasks.length === 0) {
        list.innerHTML = '<div class="empty">No tasks yet</div>';
        return;
      }

      list.innerHTML = activeTasks.map((t, idx) => {
        const overdue = isOverdue(t.due, t.completed);
        const urgency = getUrgency(t);
        const isFirst = idx === 0;
        const isLast  = idx === activeTasks.length - 1;
        const assigneeKey = t.assignedTo === 'self' ? 'efrain' : t.assignedTo;
        const assigneeBadge = t.assignedTo
          ? `<span class="task-assignee ${assigneeKey}">→ ${escapeHtml(t.assignedToName || (assigneeKey[0].toUpperCase() + assigneeKey.slice(1)))}</span>`
          : '';
        const dueText = t.due
          ? `<span class="task-due ${overdue ? 'overdue-text' : ''}" onclick="editTaskDate('${t.id}')" title="Click to reschedule">
              ${overdue ? '⚠ Overdue · ' : '📅 '}${formatDate(t.due)}
            </span>`
          : `<span class="task-due" onclick="editTaskDate('${t.id}')" title="Click to set a date" style="opacity:.6">📅 No date</span>`;
        const comments = taskComments(t);
        const cCount   = comments.length;
        const isExpanded = window._expandedTaskIds && window._expandedTaskIds.has(t.id);
        return `
          <div class="task-card urgency-${urgency}" data-task-id="${t.id}">
            <div class="task-row">
              <input type="checkbox" class="task-check" onchange="toggleTask('${t.id}')">
              <div class="task-body">
                <div class="task-title" ondblclick="editTask('${t.id}')">${escapeHtml(t.title)}</div>
                <div class="task-meta">
                  ${assigneeBadge}
                  ${dueText}
                  ${t.createdBy ? `<span class="task-by">by ${escapeHtml(t.createdBy)}</span>` : ''}
                  <button class="task-comment-toggle ${cCount > 0 ? 'has-comments' : ''}"
                    onclick="toggleComments('${t.id}')"
                    title="${cCount > 0 ? cCount + ' note' + (cCount === 1 ? '' : 's') : 'Add a note'}">
                    💬 ${cCount > 0 ? cCount : 'Add note'}
                  </button>
                </div>
              </div>
              <div class="task-actions">
                <div class="move-btns">
                  <button class="btn-move" onclick="moveTask('${t.id}','up')"
                    ${isFirst ? 'disabled' : ''} title="Move up">▲</button>
                  <button class="btn-move" onclick="moveTask('${t.id}','down')"
                    ${isLast ? 'disabled' : ''} title="Move down">▼</button>
                </div>
                <button class="btn-edit" onclick="editTask('${t.id}')" title="Edit name">✏</button>
                <button class="btn-delete" onclick="deleteTask('${t.id}')" title="Delete">×</button>
              </div>
            </div>
            ${isExpanded ? renderCommentSection(t.id, comments) : ''}
          </div>`;
      }).join('');
    });

    renderCompleted();

    // Restore focus / cursor if a comment input was being typed in
    if (focusInfo) {
      const el = document.getElementById(focusInfo.id);
      if (el) {
        el.focus();
        try { el.setSelectionRange(focusInfo.start, focusInfo.end); } catch (e) {}
      }
    }
  }

  function renderCompleted() {
    const completed = (window._tasks || [])
      .filter(t => t.completed)
      .sort((a, b) => (b.completedAt || 0) - (a.completedAt || 0));

    document.getElementById('completed-count').textContent = completed.length;
    document.getElementById('clear-btn').style.display = completed.length > 0 ? 'inline-block' : 'none';

    const list = document.getElementById('completed-list');
    if (completed.length === 0) {
      list.innerHTML = '<div class="completed-empty">Nothing here yet — completed tasks will appear here.</div>';
      return;
    }

    list.innerHTML = completed.map(t => {
      const label = t.owner === 'matt' ? 'For Matt'
                  : t.owner === 'moe'  ? 'For Moe'
                  : 'General';
      const when = t.completedAt
        ? new Date(t.completedAt).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' })
        : '';
      const assigneeKey = t.assignedTo === 'self' ? 'efrain' : t.assignedTo;
      const assigneeBadge = t.assignedTo
        ? `<span class="task-assignee ${assigneeKey}">→ ${escapeHtml(t.assignedToName || (assigneeKey[0].toUpperCase() + assigneeKey.slice(1)))}</span>`
        : '';
      const comments = taskComments(t);
      const cCount   = comments.length;
      const isExpanded = window._expandedTaskIds && window._expandedTaskIds.has(t.id);
      return `
        <div class="completed-item" data-task-id="${t.id}">
          <div class="completed-row">
            <span class="completed-icon">✓</span>
            <div class="completed-body">
              <div class="completed-title">${escapeHtml(t.title)}</div>
              <div class="completed-meta">
                <span class="completed-tag ${t.owner}">${label}</span>
                ${assigneeBadge}
                ${t.completedBy ? `<span>finished by ${escapeHtml(t.completedBy)}</span>` : ''}
                ${when ? `<span>· ${when}</span>` : ''}
                <button class="task-comment-toggle ${cCount > 0 ? 'has-comments' : ''}"
                  onclick="toggleComments('${t.id}')"
                  title="${cCount > 0 ? cCount + ' note' + (cCount === 1 ? '' : 's') : 'Add a note'}">
                  💬 ${cCount > 0 ? cCount : 'Add note'}
                </button>
              </div>
            </div>
            <button class="btn-edit" onclick="toggleTask('${t.id}')" title="Reopen task">↩</button>
            <button class="btn-delete" onclick="deleteTask('${t.id}')" title="Delete">×</button>
          </div>
          ${isExpanded ? renderCommentSection(t.id, comments) : ''}
        </div>`;
    }).join('');
  }

  window.switchView = (view) => {
    document.body.classList.remove('view-active', 'view-completed');
    document.body.classList.add('view-' + view);
    document.querySelectorAll('.view-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.view === view);
    });
  };

  window.clearAllCompleted = () => {
    const completed = (window._tasks || []).filter(t => t.completed);
    if (completed.length === 0) return;
    if (!confirm(`Delete all ${completed.length} completed task${completed.length === 1 ? '' : 's'}? This cannot be undone.`)) return;
    completed.forEach(t => window.deleteTask(t.id));
  };
  setInterval(render, 60000);
  render();
</script>

</body>
</html>
