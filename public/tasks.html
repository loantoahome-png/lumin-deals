<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Reminders</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; color: #1e293b; min-height: 100vh; }

  /* ── Header ── */
  header {
    background: #ffffff;
    border-bottom: 1px solid #e2e8f0;
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
    position: sticky;
    top: 0;
    z-index: 40;
  }
  header h1 {
    font-size: 1.5rem;
    font-weight: 800;
    background: linear-gradient(135deg, #0ea5e9, #8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header-right { display: flex; align-items: center; gap: .75rem; }
  .sync-badge {
    display: inline-flex; align-items: center; gap: .35rem;
    font-size: .75rem; color: #10b981; font-weight: 600;
  }
  .sync-badge.offline { color: #f59e0b; }
  .sync-dot { width: 8px; height: 8px; background: currentColor; border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .notif-btn {
    background: none; border: 1px solid #e2e8f0; color: #64748b;
    cursor: pointer; font-size: .75rem; padding: 4px 12px; border-radius: 999px;
    font-weight: 600; transition: all .15s;
  }
  .notif-btn:hover { background: #f1f5f9; color: #334155; }
  .notif-btn.enabled { background: #dcfce7; border-color: #86efac; color: #166534; }
  .gear-btn {
    background: none; border: none; color: #94a3b8; cursor: pointer;
    font-size: 1.1rem; padding: .3rem .45rem; border-radius: 6px; transition: all .15s;
  }
  .gear-btn:hover { background: #f1f5f9; color: #475569; }

  /* ── Main layout ── */
  .main { max-width: 820px; margin: 0 auto; padding: 1.5rem 1.25rem 3rem; }

  /* ── Toolbar (tabs + filter) ── */
  .toolbar {
    display: flex; align-items: center; gap: .75rem; flex-wrap: wrap;
    margin-bottom: 1.25rem;
  }
  .view-tabs { display: flex; gap: .4rem; }
  .view-tab {
    background: #f1f5f9; border: 1px solid transparent; color: #64748b;
    padding: .45rem .9rem; border-radius: 999px; font-size: .85rem;
    font-weight: 600; cursor: pointer; transition: all .15s;
  }
  .view-tab:hover { background: #e2e8f0; }
  .view-tab.active { background: #fff; border-color: #0ea5e9; color: #0369a1; box-shadow: 0 0 0 3px rgba(14,165,233,.12); }
  .view-tab .pill { background: #e2e8f0; color: #475569; font-size: .7rem; padding: 1px 7px; border-radius: 999px; margin-left: .35rem; font-weight: 700; }
  .view-tab.active .pill { background: #0ea5e9; color: #fff; }

  .filter-label { font-size: .8rem; font-weight: 600; color: #64748b; white-space: nowrap; }
  .filter-tabs { display: flex; gap: .35rem; flex-wrap: wrap; }
  .filter-tab {
    padding: .35rem .8rem; border-radius: 999px; font-size: .8rem; font-weight: 600;
    border: 1px solid #e2e8f0; background: #fff; color: #64748b; cursor: pointer; transition: all .15s;
  }
  .filter-tab:hover { border-color: #94a3b8; color: #334155; }
  .filter-tab.active { color: #fff; border-color: transparent; }
  .filter-tab[data-filter="all"].active    { background: #475569; }
  .filter-tab[data-filter="Matt"].active   { background: #0369a1; }
  .filter-tab[data-filter="Moe"].active    { background: #6d28d9; }
  .filter-tab[data-filter="Efrain"].active { background: #b45309; }
  .filter-tab[data-filter="Bri"].active    { background: #be185d; }

  .toolbar-right { margin-left: auto; }
  .clear-btn {
    background: #fff; border: 1px solid #fca5a5; color: #dc2626;
    padding: .4rem .85rem; border-radius: 8px; font-size: .8rem;
    font-weight: 600; cursor: pointer; transition: all .15s;
  }
  .clear-btn:hover { background: #fef2f2; }
  .clear-btn:disabled { opacity: .35; cursor: not-allowed; }

  /* ── Add task button ── */
  .add-task-btn {
    width: 100%; background: transparent; border: 2px dashed #cbd5e1;
    color: #64748b; padding: .85rem; border-radius: 12px; font-size: .9rem;
    font-weight: 600; cursor: pointer; transition: all .15s; margin-bottom: 1rem; font-family: inherit;
  }
  .add-task-btn:hover { border-color: #94a3b8; color: #334155; background: #fff; }

  /* ── Add form ── */
  .add-form { display: none; flex-direction: column; gap: .5rem; margin-bottom: 1rem; background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 1rem; box-shadow: 0 4px 16px rgba(0,0,0,.06); animation: slide-in .18s ease; }
  .add-form.show { display: flex; }
  @keyframes slide-in { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
  .add-form input[type="text"], .add-form select {
    background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;
    padding: .6rem .75rem; color: #1e293b; font-size: .9rem; outline: none;
    transition: border-color .15s, box-shadow .15s; font-family: inherit; width: 100%;
  }
  .add-form input[type="text"]:focus, .add-form select:focus {
    border-color: #94a3b8; box-shadow: 0 0 0 3px rgba(148,163,184,.15); background: #fff;
  }
  .form-row { display: flex; gap: .5rem; flex-wrap: wrap; }
  .form-row > * { flex: 1; min-width: 140px; }
  .form-label { font-size: .75rem; font-weight: 600; color: #64748b; margin-bottom: .2rem; }
  .form-group { display: flex; flex-direction: column; flex: 1; min-width: 140px; }
  .form-actions { display: flex; justify-content: flex-end; gap: .5rem; margin-top: .25rem; }
  .btn-cancel {
    background: transparent; border: 1px solid #e2e8f0; color: #64748b;
    border-radius: 8px; padding: .5rem .9rem; font-weight: 600; font-size: .85rem; cursor: pointer; transition: all .15s;
  }
  .btn-cancel:hover { background: #f1f5f9; color: #334155; }
  .btn-add {
    background: linear-gradient(135deg, #0ea5e9, #8b5cf6); border: none;
    border-radius: 8px; padding: .5rem 1.1rem; color: #fff; font-weight: 700;
    font-size: .85rem; cursor: pointer; transition: opacity .2s; white-space: nowrap;
  }
  .btn-add:hover { opacity: .9; }
  .btn-add:disabled { background: #cbd5e1; cursor: not-allowed; }

  /* Date/time selects inside form */
  .date-select, .time-select-btn {
    background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;
    padding: .6rem .75rem; color: #1e293b; font-size: .85rem; outline: none;
    cursor: pointer; font-family: inherit; width: 100%;
  }
  .date-select:focus { border-color: #94a3b8; box-shadow: 0 0 0 3px rgba(148,163,184,.15); }
  .date-select.has-value { border-color: #0ea5e9; color: #0369a1; font-weight: 600; background: #eff6ff; }
  .custom-date { width: 100%; background: #fffbeb; border: 1px solid #fbbf24; border-radius: 8px; padding: .55rem .75rem; font-size: .85rem; outline: none; color: #1e293b; display: none; margin-top: .25rem; }

  /* Dropdown (time) */
  .dropdown { position: relative; flex: 1; }
  .dropdown-trigger {
    width: 100%; display: flex; align-items: center; justify-content: space-between;
    gap: .35rem; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;
    padding: .6rem .75rem; color: #1e293b; font-size: .85rem; cursor: pointer;
    font-family: inherit; transition: border-color .15s;
  }
  .dropdown-trigger.has-value { border-color: #0ea5e9; color: #0369a1; font-weight: 600; background: #eff6ff; }
  .dd-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dd-caret { color: #94a3b8; font-size: .7rem; flex-shrink: 0; }
  .dropdown-menu {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    max-height: 220px; overflow-y: auto; background: #fff; border: 1px solid #e2e8f0;
    border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,.15); z-index: 60; padding: .25rem;
  }
  .dropdown-menu[hidden] { display: none; }
  .dropdown-item {
    display: block; width: 100%; background: none; border: none;
    padding: .45rem .65rem; text-align: left; font-size: .85rem; color: #334155;
    border-radius: 6px; cursor: pointer; font-family: inherit;
  }
  .dropdown-item:hover { background: #f1f5f9; }
  .dropdown-item.selected { background: #e0f2fe; color: #0369a1; font-weight: 600; }

  /* ── Task list ── */
  .task-list { display: flex; flex-direction: column; gap: .65rem; }
  .empty { text-align: center; color: #94a3b8; font-size: .9rem; padding: 3rem 0; }

  /* ── Task card ── */
  .task-card {
    background: #fff; border: 1px solid #e2e8f0; border-left: 5px solid #cbd5e1;
    border-radius: 12px; display: flex; flex-direction: column;
    transition: transform .18s ease, box-shadow .18s ease; animation: slide-in .2s ease;
  }
  .task-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(15,23,42,.08); }
  .task-card.completed { opacity: .45; }
  .task-card.completed .task-title { text-decoration: line-through; }

  /* Urgency */
  .task-card.urgency-overdue  { border-left-color:#dc2626; background:#fee2e2; border-color:#fca5a5; }
  .task-card.urgency-overdue:hover  { background:#fecaca; box-shadow:0 6px 20px rgba(220,38,38,.2); }
  .task-card.urgency-today    { border-left-color:#ea580c; background:#ffedd5; border-color:#fdba74; }
  .task-card.urgency-today:hover    { background:#fed7aa; box-shadow:0 6px 20px rgba(234,88,12,.2); }
  .task-card.urgency-tomorrow { border-left-color:#ca8a04; background:#fef9c3; border-color:#fde047; }
  .task-card.urgency-tomorrow:hover { background:#fef08a; box-shadow:0 6px 20px rgba(202,138,4,.18); }
  .task-card.urgency-week     { border-left-color:#2563eb; background:#dbeafe; border-color:#93c5fd; }
  .task-card.urgency-week:hover     { background:#bfdbfe; box-shadow:0 6px 20px rgba(37,99,235,.18); }

  .task-row { display: flex; align-items: flex-start; gap: .75rem; padding: .9rem 1rem .9rem .85rem; }
  .task-check { margin-top: 3px; width: 18px; height: 18px; accent-color: #0ea5e9; cursor: pointer; flex-shrink: 0; }
  .task-body { flex: 1; min-width: 0; }
  .task-title { font-size: .95rem; font-weight: 600; color: #0f172a; line-height: 1.4; word-break: break-word; }
  .task-edit-input {
    width: 100%; background: #fffbeb; border: 1px solid #fbbf24; border-radius: 6px;
    padding: .35rem .5rem; font-size: .9rem; color: #1e293b; font-family: inherit; outline: none;
  }
  .task-edit-input:focus { box-shadow: 0 0 0 3px rgba(251,191,36,.2); }

  .task-meta { display: flex; align-items: center; flex-wrap: wrap; gap: .45rem; margin-top: .35rem; }
  .task-due {
    display: inline-flex; align-items: center; gap: .3rem; font-size: .72rem; color: #64748b;
    cursor: pointer; padding: 2px 6px; border-radius: 6px; transition: background .15s;
  }
  .task-due:hover { background: #f1f5f9; }
  .task-due.overdue-text { color: #ef4444; font-weight: 600; }
  .task-due.overdue-text:hover { background: #fef2f2; }

  /* Assignee / By badges */
  .badge {
    font-size: .7rem; padding: 2px 8px; border-radius: 999px; font-weight: 700; white-space: nowrap;
  }
  .badge-to   { background: #f1f5f9; color: #475569; }
  .badge-matt { background: #e0f2fe; color: #0369a1; }
  .badge-moe  { background: #ede9fe; color: #6d28d9; }
  .badge-efrain { background: #fef3c7; color: #92400e; }
  .badge-bri  { background: #fce7f3; color: #be185d; }
  .badge-by { background: #f0fdf4; color: #166534; font-weight: 500; }

  .task-actions {
    display: flex; align-items: flex-start; gap: 2px; flex-shrink: 0;
    opacity: 0; transform: translateX(6px); transition: opacity .15s, transform .15s;
  }
  .task-card:hover .task-actions, .task-card:focus-within .task-actions { opacity: 1; transform: translateX(0); }
  @media (max-width: 640px) { .task-actions { opacity: 1; transform: none; } }

  .btn-icon {
    background: none; border: none; cursor: pointer; padding: 2px 5px;
    border-radius: 4px; transition: color .15s; flex-shrink: 0; line-height: 1;
  }
  .btn-delete { color: #cbd5e1; font-size: 1.1rem; }
  .btn-delete:hover { color: #ef4444; }
  .btn-edit   { color: #cbd5e1; font-size: .85rem; }
  .btn-edit:hover   { color: #0ea5e9; }
  .move-btns { display: flex; flex-direction: column; gap: 1px; flex-shrink: 0; margin-top: 1px; }
  .btn-move { background: none; border: none; color: #cbd5e1; cursor: pointer; font-size: .7rem; padding: 1px 4px; border-radius: 3px; line-height: 1; transition: color .15s; }
  .btn-move:hover:not(:disabled) { color: #0ea5e9; background: #f1f5f9; }
  .btn-move:disabled { opacity: .25; cursor: not-allowed; }

  /* ── Comments ── */
  .task-comment-toggle {
    display: inline-flex; align-items: center; gap: .25rem; font-size: .72rem;
    color: #475569; background: #f1f5f9; padding: 2px 9px; border-radius: 999px;
    font-weight: 600; cursor: pointer; border: 1px solid transparent; font-family: inherit; transition: all .15s;
  }
  .task-comment-toggle:hover { background: #e2e8f0; color: #0f172a; }
  .task-comment-toggle.has-comments { background: #dbeafe; color: #1e40af; border-color: #93c5fd; }
  .task-comment-toggle.has-comments:hover { background: #bfdbfe; }
  .task-comments { padding: .75rem 1rem .9rem .85rem; border-top: 1px dashed rgba(15,23,42,.12); }
  .comment-list { display: flex; flex-direction: column; gap: .5rem; margin-bottom: .65rem; }
  .comment-item { background: rgba(255,255,255,.75); border: 1px solid #e2e8f0; border-radius: 8px; padding: .55rem .7rem; position: relative; }
  .comment-text { font-size: .85rem; color: #1e293b; line-height: 1.45; word-break: break-word; white-space: pre-wrap; }
  .comment-meta { display: flex; align-items: center; gap: .35rem; margin-top: .25rem; font-size: .7rem; color: #94a3b8; }
  .comment-author { font-weight: 600; color: #64748b; }
  .btn-delete-comment { position: absolute; top: 4px; right: 6px; background: none; border: none; color: #cbd5e1; cursor: pointer; font-size: .9rem; line-height: 1; padding: 2px 4px; border-radius: 4px; transition: color .15s; }
  .btn-delete-comment:hover { color: #ef4444; }
  .comment-input-row { display: flex; gap: .35rem; }
  .comment-input { flex: 1; border: 1px solid #cbd5e1; border-radius: 8px; padding: .5rem .65rem; font-size: .85rem; font-family: inherit; color: #1e293b; outline: none; background: #fff; }
  .comment-input:focus { border-color: #94a3b8; box-shadow: 0 0 0 3px rgba(148,163,184,.15); }
  .btn-add-comment { background: linear-gradient(135deg,#0ea5e9,#8b5cf6); border: none; border-radius: 8px; padding: 0 .85rem; color: #fff; font-weight: 700; font-size: .8rem; cursor: pointer; }
  .btn-add-comment:hover { opacity: .9; }

  /* ── Completed view ── */
  .completed-view { display: none; }
  body.view-completed .board-area, body.view-completed .urgency-legend { display: none; }
  body.view-completed .completed-view { display: block; }
  .completed-list { display: flex; flex-direction: column; gap: .5rem; }
  .completed-item { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; }
  .completed-row { display: flex; align-items: center; gap: .75rem; padding: .75rem 1rem; }
  .completed-icon { color: #10b981; font-size: 1.05rem; flex-shrink: 0; }
  .completed-body { flex: 1; min-width: 0; }
  .completed-title { font-size: .9rem; color: #1e293b; word-break: break-word; }
  .completed-meta { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: .25rem; font-size: .72rem; color: #94a3b8; }
  .completed-empty { text-align: center; color: #94a3b8; font-size: .9rem; padding: 3rem 0; }

  /* ── Date edit popover ── */
  .date-edit-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.5); display: flex; align-items: center; justify-content: center; z-index: 150; padding: 1rem; backdrop-filter: blur(4px); }
  .date-edit-overlay[hidden] { display: none; }
  .date-edit-panel { background: #fff; border-radius: 14px; padding: 1.5rem; max-width: 440px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,.25); animation: slide-in .2s ease; }
  .date-edit-title { font-size: 1.05rem; font-weight: 700; color: #0f172a; margin-bottom: .25rem; }
  .date-edit-task-name { font-size: .875rem; color: #64748b; margin-bottom: 1rem; word-break: break-word; }
  .date-edit-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; flex-wrap: wrap; gap: .5rem; }
  .btn-clear-date { background: transparent; border: 1px solid #fca5a5; color: #dc2626; border-radius: 8px; padding: .5rem .9rem; font-weight: 600; font-size: .85rem; cursor: pointer; }
  .btn-clear-date:hover { background: #fef2f2; }

  /* ── Urgency legend ── */
  .urgency-legend {
    max-width: 820px; margin: 1.25rem auto 2rem; padding: .85rem 1.25rem;
    background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px;
    display: flex; align-items: center; flex-wrap: wrap; gap: 1rem;
  }
  .legend-title { font-size: .75rem; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: .04em; }
  .legend-item { display: inline-flex; align-items: center; gap: .5rem; font-size: .78rem; color: #475569; font-weight: 500; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 4px; border-left: 4px solid; }
  .legend-swatch.overdue  { background:#fee2e2; border-color:#dc2626; border:1px solid #fca5a5; border-left:4px solid #dc2626; }
  .legend-swatch.today    { background:#ffedd5; border-color:#ea580c; border:1px solid #fdba74; border-left:4px solid #ea580c; }
  .legend-swatch.tomorrow { background:#fef9c3; border-color:#ca8a04; border:1px solid #fde047; border-left:4px solid #ca8a04; }
  .legend-swatch.week     { background:#dbeafe; border-color:#2563eb; border:1px solid #93c5fd; border-left:4px solid #2563eb; }
  .legend-swatch.later    { background:#ffffff; border-color:#94a3b8; border:1px solid #e2e8f0; border-left:4px solid #94a3b8; }

  /* ── Settings modal ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.55); display: none; align-items: center; justify-content: center; padding: 1rem; z-index: 100; backdrop-filter: blur(4px); }
  .modal-overlay.show { display: flex; }
  .modal { background: #fff; border-radius: 14px; padding: 1.75rem; max-width: 420px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,.25); }
  .modal h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: .25rem; color: #0f172a; }
  .modal .subtitle { color: #64748b; font-size: .875rem; margin-bottom: 1rem; }
  .modal label { display: block; font-size: .8rem; font-weight: 600; color: #475569; margin-bottom: .35rem; margin-top: .75rem; }
  .modal input[type="text"] { width: 100%; border: 1px solid #cbd5e1; border-radius: 8px; padding: .6rem .75rem; font-size: .9rem; color: #1e293b; outline: none; }
  .modal input:focus { border-color: #94a3b8; box-shadow: 0 0 0 3px rgba(148,163,184,.15); }
  .modal-actions { display: flex; justify-content: flex-end; gap: .5rem; margin-top: 1rem; }
  .btn-secondary { background: #f1f5f9; color: #475569; border: none; border-radius: 8px; padding: .5rem 1rem; font-weight: 600; font-size: .85rem; cursor: pointer; }
  .btn-secondary:hover { background: #e2e8f0; }
  .btn-primary { background: linear-gradient(135deg,#0ea5e9,#8b5cf6); color: #fff; border: none; border-radius: 8px; padding: .5rem 1rem; font-weight: 700; font-size: .85rem; cursor: pointer; }
  .btn-primary:hover { opacity: .92; }
</style>
</head>
<body class="view-active">

<header>
  <h1>Task Reminders</h1>
  <div class="header-right">
    <div class="sync-badge offline" id="sync-badge">
      <span class="sync-dot"></span> <span id="sync-text">Connecting…</span>
    </div>
    <button class="notif-btn" id="notif-btn" onclick="toggleNotifications()" style="display:none">🔔 Enable reminders</button>
    <button class="gear-btn" onclick="openSettings()" title="Settings">⚙</button>
  </div>
</header>

<div class="main">

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="view-tabs">
      <button class="view-tab active" data-view="active" onclick="switchView('active')">
        📋 Active
      </button>
      <button class="view-tab" data-view="completed" onclick="switchView('completed')">
        ✅ Completed <span class="pill" id="completed-count">0</span>
      </button>
    </div>

    <span class="filter-label">Assigned to:</span>
    <div class="filter-tabs" id="filter-tabs">
      <button class="filter-tab active" data-filter="all"    onclick="setFilter('all')">All</button>
      <button class="filter-tab"        data-filter="Matt"   onclick="setFilter('Matt')">Matt</button>
      <button class="filter-tab"        data-filter="Moe"    onclick="setFilter('Moe')">Moe</button>
      <button class="filter-tab"        data-filter="Efrain" onclick="setFilter('Efrain')">Efrain</button>
      <button class="filter-tab"        data-filter="Bri"    onclick="setFilter('Bri')">Bri</button>
    </div>

    <div class="toolbar-right">
      <button class="clear-btn" id="clear-btn" onclick="clearAllCompleted()" style="display:none">Clear all completed</button>
    </div>
  </div>

  <!-- Active board -->
  <div class="board-area">
    <button type="button" class="add-task-btn" id="add-btn" onclick="toggleAddForm()">+ Add task</button>

    <form class="add-form" id="add-form" onsubmit="return addTask(event)">
      <input type="text" id="task-input" placeholder="What needs to get done?" required>

      <div class="form-row">
        <div class="form-group">
          <div class="form-label">Assigned to</div>
          <select id="sel-assigned-to" class="date-select">
            <option value="">— Select —</option>
            <option value="Matt">Matt</option>
            <option value="Moe">Moe</option>
            <option value="Efrain">Efrain</option>
            <option value="Bri">Bri</option>
          </select>
        </div>
        <div class="form-group">
          <div class="form-label">Assigned by</div>
          <select id="sel-assigned-by" class="date-select">
            <option value="">— Select —</option>
            <option value="Matt">Matt</option>
            <option value="Moe">Moe</option>
            <option value="Efrain">Efrain</option>
            <option value="Bri">Bri</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <div class="form-label">Due date</div>
          <select class="date-select" id="date-sel" onchange="handleDateChange()" title="Date"></select>
          <input type="date" id="date-custom" class="custom-date" onchange="handleDateChange()">
        </div>
        <div class="form-group">
          <div class="form-label">Time</div>
          <div class="dropdown" id="time-dd">
            <button type="button" class="dropdown-trigger" onclick="toggleTimeMenu(event)">
              <span class="dd-label">No time</span>
              <span class="dd-caret">▾</span>
            </button>
            <div class="dropdown-menu" id="time-menu" hidden></div>
            <input type="hidden" id="time-sel">
          </div>
        </div>
      </div>
      <input type="hidden" id="date-final">

      <div class="form-actions">
        <button type="button" class="btn-cancel" onclick="cancelAddForm()">Cancel</button>
        <button class="btn-add" type="submit">+ Add Task</button>
      </div>
    </form>

    <div class="task-list" id="task-list">
      <p class="empty">Loading tasks…</p>
    </div>
  </div>

  <!-- Completed view -->
  <div class="completed-view">
    <div class="completed-list" id="completed-list"></div>
  </div>

</div><!-- /main -->

  <span class="legend-item"><span class="legend-swatch overdue"></span>Overdue</span>
  <span class="legend-item"><span class="legend-swatch today"></span>Due today</span>
  <span class="legend-item"><span class="legend-swatch tomorrow"></span>Due tomorrow</span>
  <span class="legend-item"><span class="legend-swatch week"></span>This week</span>

</div>

<!-- Date edit popover -->
<div class="date-edit-overlay" id="date-edit-overlay" hidden onclick="closeDateEdit(event)">
  <div class="date-edit-panel" onclick="event.stopPropagation()">
    <h3 class="date-edit-title">Reschedule task</h3>
    <p class="date-edit-task-name" id="date-edit-task-name"></p>
    <div class="form-row">
      <div class="form-group">
        <select class="date-select" id="edit-date-sel" onchange="handleEditDateChange()" title="Date"></select>
        <input type="date" id="edit-date-custom" class="custom-date" onchange="handleEditDateChange()">
      </div>
      <div class="form-group">
        <div class="dropdown" id="edit-time-dd">
          <button type="button" class="dropdown-trigger" onclick="toggleEditTimeMenu(event)">
            <span class="dd-label">No time</span><span class="dd-caret">▾</span>

<!-- Settings modal -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h2>Settings</h2>
    <p class="subtitle">Change your display name shown on tasks</p>
    <label>Your name</label>
    <input type="text" id="display-name-input" placeholder="e.g. Efrain">
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeSettings()">Cancel</button>
      <button class="btn-primary" onclick="saveDisplayName()">Save</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp }   from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
  import { getDatabase, ref, onValue, push, update, remove, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";

  const STORAGE_NAME  = 'display_name_v1';
  const STORAGE_NOTIF = 'notified_ids_v1';

  const FB_CONFIG = {
    apiKey: "AIzaSyCI_r-Aqx5kuWGhnzyCQjJK3-fhOLkB8L0",
    authDomain: "matt-moe-tasks.firebaseapp.com",
    databaseURL: "https://matt-moe-tasks-default-rtdb.firebaseio.com",
    projectId: "matt-moe-tasks",
    storageBucket: "matt-moe-tasks.firebasestorage.app",
    messagingSenderId: "1070251285882",
    appId: "1:1070251285882:web:fe66d894065d14b24c8ac3"
  };

  const app      = initializeApp(FB_CONFIG);
  const db       = getDatabase(app);
  const tasksRef = ref(db, 'tasks');

  let currentUser = { displayName: localStorage.getItem(STORAGE_NAME) || 'Lumin Team', uid: 'team' };
  let _tasks      = [];
  let _filter     = 'all';
  let _view       = 'active';

  // ── Boot ──
  document.getElementById('notif-btn').style.display = 'inline-block';
  document.getElementById('display-name-input').value = currentUser.displayName;
  document.getElementById('sync-badge').classList.remove('offline');
  document.getElementById('sync-text').textContent = 'Live sync active';
  populateDateSelects();
  populateTimeMenu('time-menu');
  populateTimeMenu('edit-time-menu');

  // ── Firebase listener ──
  onValue(tasksRef, snap => {
    const data = snap.val() || {};
    _tasks = Object.entries(data).map(([id, t]) => ({ id, ...t }));
    window._tasks = _tasks;
    render();
    checkDueReminders();
  }, err => {
    document.getElementById('sync-text').textContent = 'Sync error';
    console.error(err);
  });

  // ── Filter ──
  window.setFilter = (f) => {
    _filter = f;
    document.querySelectorAll('.filter-tab').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === f);
    });
    render();
  };

  // ── View switch ──
  window.switchView = (v) => {
    _view = v;
    document.body.className = 'view-' + v;
    document.querySelectorAll('.view-tab').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.view === v);
    });
    const clearBtn = document.getElementById('clear-btn');
    clearBtn.style.display = v === 'completed' ? 'inline-block' : 'none';
    render();
  };

  // ── Render ──
  function getUrgency(due) {
    if (!due) return 'later';
    const now   = new Date();
    const dueDate = new Date(due.includes('T') ? due : due + 'T23:59:59');
    const todayEnd = new Date(); todayEnd.setHours(23,59,59,999);
    const tomorrowEnd = new Date(todayEnd); tomorrowEnd.setDate(tomorrowEnd.getDate() + 1);
    const weekEnd = new Date(todayEnd); weekEnd.setDate(weekEnd.getDate() + 6);
    if (dueDate < now) return 'overdue';
    if (dueDate <= todayEnd) return 'today';
    if (dueDate <= tomorrowEnd) return 'tomorrow';
    if (dueDate <= weekEnd) return 'week';
    return 'later';
  }

  function formatDue(due) {
    if (!due) return null;
    const d = new Date(due.includes('T') ? due : due + 'T00:00:00');
    const hasTime = due.includes('T');
    const dateStr = d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
    if (!hasTime) return dateStr;
    const time = d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
    return `${dateStr} · ${time}`;
  }

  function assigneeClass(name) {
    if (!name) return '';
    const n = name.toLowerCase();
    if (n === 'matt')   return 'badge-matt';
    if (n === 'moe')    return 'badge-moe';
    if (n === 'efrain') return 'badge-efrain';
    if (n === 'bri')    return 'badge-bri';
    return 'badge-to';
  }

  function render() {
    const active    = _tasks.filter(t => !t.completed);
    const completed = _tasks.filter(t => t.completed);

    // Update completed count pill
    document.getElementById('completed-count').textContent = completed.length;

    // Apply "assigned to" filter
    const filtered = _filter === 'all'
      ? active
      : active.filter(t => {
          // support new assignedTo field + legacy owner field
          const to = t.assignedTo || legacyOwnerName(t.owner) || '';
          return to === _filter;
        });

    // Sort: urgency first, then order
    const urgencyOrder = { overdue:0, today:1, tomorrow:2, week:3, later:4 };
    filtered.sort((a,b) => {
      const ua = urgencyOrder[getUrgency(a.due)];
      const ub = urgencyOrder[getUrgency(b.due)];
      if (ua !== ub) return ua - ub;
      return (a.order || 0) - (b.order || 0);
    });

    // Active list
    const list = document.getElementById('task-list');
    if (filtered.length === 0) {
      list.innerHTML = '<p class="empty">No tasks' + (_filter !== 'all' ? ' for ' + _filter : '') + ' 🎉</p>';
    } else {
      list.innerHTML = filtered.map((t, idx) => taskCardHTML(t, idx, filtered.length)).join('');
    }

    // Completed list
    const compList = document.getElementById('completed-list');
    if (completed.length === 0) {
      compList.innerHTML = '<p class="completed-empty">No completed tasks yet</p>';
    } else {
      compList.innerHTML = completed.map(t => {
        const to = t.assignedTo || legacyOwnerName(t.owner);
        const by = t.assignedBy;
        return `<div class="completed-item">
          <div class="completed-row">
            <span class="completed-icon">✅</span>
            <div class="completed-body">
              <div class="completed-title">${esc(t.title)}</div>
              <div class="completed-meta">
                ${to ? `<span class="badge ${assigneeClass(to)}">${esc(to)}</span>` : ''}
                ${by ? `<span class="badge badge-by">by ${esc(by)}</span>` : ''}
                ${t.completedBy ? `<span>Completed by ${esc(t.completedBy)}</span>` : ''}
              </div>
            </div>
            <button class="btn-icon btn-delete" onclick="deleteTask('${t.id}')" title="Delete">🗑</button>
          </div>
        </div>`;
      }).join('');
    }
  }

  function legacyOwnerName(owner) {
    if (owner === 'matt')    return 'Matt';
    if (owner === 'moe')     return 'Moe';
    if (owner === 'efrain')  return 'Efrain';
    return null;
  }

  function taskCardHTML(t, idx, total) {
    const urgency = getUrgency(t.due);
    const dueStr  = formatDue(t.due);
    const isOverdue = urgency === 'overdue';
    const comments = t.comments ? Object.entries(t.comments).map(([cid,c]) => ({cid,...c})) : [];
    const hasComments = comments.length > 0;

    const to = t.assignedTo || legacyOwnerName(t.owner);
    const by = t.assignedBy;

    return `
    <div class="task-card urgency-${urgency}${t.completed ? ' completed' : ''}" id="card-${t.id}">
      <div class="task-row">
        <input type="checkbox" class="task-check" ${t.completed ? 'checked' : ''} onchange="toggleTask('${t.id}')">
        <div class="task-body">
          <div class="task-title" id="title-${t.id}">${esc(t.title)}</div>
          <input type="text" class="task-edit-input" id="edit-${t.id}" value="${esc(t.title)}"
            style="display:none" onblur="saveEdit('${t.id}')" onkeydown="editKeydown(event,'${t.id}')">
          <div class="task-meta">
            ${dueStr ? `<button type="button" class="task-due${isOverdue?' overdue-text':''}" onclick="openDateEdit('${t.id}')">📅 ${esc(dueStr)}</button>` : `<button type="button" class="task-due" onclick="openDateEdit('${t.id}')">📅 Add date</button>`}
            ${to ? `<span class="badge ${assigneeClass(to)}">${esc(to)}</span>` : ''}
            ${by ? `<span class="badge badge-by">by ${esc(by)}</span>` : ''}
            ${t.createdBy ? `<span style="font-size:.68rem;color:#94a3b8">${esc(t.createdBy)}</span>` : ''}
            <button type="button" class="task-comment-toggle${hasComments?' has-comments':''}" onclick="toggleComments('${t.id}')">
              💬 ${hasComments ? comments.length : 'Add note'}
            </button>
          </div>
        </div>
        <div class="task-actions">
          <div class="move-btns">
            <button type="button" class="btn-move" ${idx===0?'disabled':''} onclick="moveTask('${t.id}',-1)" title="Move up">▲</button>
            <button type="button" class="btn-move" ${idx===total-1?'disabled':''} onclick="moveTask('${t.id}',1)" title="Move down">▼</button>
          </div>
          <button type="button" class="btn-icon btn-edit" onclick="startEdit('${t.id}')" title="Edit">✏️</button>
          <button type="button" class="btn-icon btn-delete" onclick="deleteTask('${t.id}')" title="Delete">🗑</button>
        </div>
      </div>
      <div class="task-comments" id="comments-${t.id}" style="display:none">
        <div class="comment-list">
          ${comments.sort((a,b)=>(a.created||0)-(b.created||0)).map(c => `
            <div class="comment-item">
              <div class="comment-text">${esc(c.text)}</div>
              <div class="comment-meta">
                <span class="comment-author">${esc(c.author||'')}</span>
                <span>${c.created ? new Date(c.created).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}) : ''}</span>
              </div>
              <button type="button" class="btn-delete-comment" onclick="deleteComment('${t.id}','${c.cid}')" title="Delete">×</button>
            </div>
          `).join('')}
        </div>
        <div class="comment-input-row">
          <input type="text" class="comment-input" id="comment-input-${t.id}" placeholder="Add a note…" onkeydown="commentKeydown(event,'${t.id}')">
          <button type="button" class="btn-add-comment" onclick="addComment('${t.id}')">Send</button>
        </div>
      </div>
    </div>`;
  }

  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Add task ──
  window.toggleAddForm = () => {
    const form = document.getElementById('add-form');
    const btn  = document.getElementById('add-btn');
    form.classList.toggle('show');
    btn.style.display = form.classList.contains('show') ? 'none' : 'block';
    if (form.classList.contains('show')) document.getElementById('task-input').focus();
  };
  window.cancelAddForm = () => {
    document.getElementById('add-form').classList.remove('show');
    document.getElementById('add-btn').style.display = 'block';
    resetAddForm();
  };
  function resetAddForm() {
    document.getElementById('task-input').value = '';
    document.getElementById('sel-assigned-to').value = '';
    document.getElementById('sel-assigned-by').value = '';
    document.getElementById('date-sel').value = '';
    document.getElementById('date-sel').classList.remove('has-value');
    document.getElementById('date-custom').style.display = 'none';
    document.getElementById('date-custom').value = '';
    document.getElementById('date-final').value = '';
    document.getElementById('time-sel').value = '';
    const trig = document.querySelector('#time-dd .dropdown-trigger');
    if (trig) { trig.querySelector('.dd-label').textContent = 'No time'; trig.classList.remove('has-value'); }
    document.querySelectorAll('#time-menu .dropdown-item').forEach(i => i.classList.remove('selected'));
  }

  window.addTask = (e) => {
    e.preventDefault();
    const title = document.getElementById('task-input').value.trim();
    if (!title) return false;
    const assignedTo = document.getElementById('sel-assigned-to').value || null;
    const assignedBy = document.getElementById('sel-assigned-by').value || currentUser.displayName || null;
    const due        = document.getElementById('date-final').value || null;

    push(tasksRef, {
      title, due,
      assignedTo, assignedBy,
      completed: false,
      createdBy: currentUser.displayName,
      createdByUid: currentUser.uid,
      created: serverTimestamp(),
      order: Date.now(),
    });
    cancelAddForm();
    return false;
  };

  // ── Task ops ──
  window.toggleTask = id => {
    const t = _tasks.find(t => t.id === id);
    if (!t) return;
    const becoming = !t.completed;
    const up = { completed: becoming };
    if (becoming) {
      up.completedBy    = currentUser.displayName;
      up.completedByUid = currentUser.uid;
      up.completedAt    = serverTimestamp();
    } else {
      up.completedBy = null; up.completedByUid = null; up.completedAt = null;
    }
    update(ref(db, 'tasks/' + id), up);
  };

  window.deleteTask = id => { if (confirm('Delete this task?')) remove(ref(db, 'tasks/' + id)); };

  window.moveTask = (id, dir) => {
    const t = _tasks.find(t => t.id === id);
    if (!t) return;
    update(ref(db, 'tasks/' + id), { order: (t.order || Date.now()) + dir * 1500 });
  };

  window.startEdit = id => {
    document.getElementById('title-' + id).style.display = 'none';
    const inp = document.getElementById('edit-' + id);
    inp.style.display = 'block';
    inp.focus();
    inp.select();
  };
  window.saveEdit = id => {
    const inp = document.getElementById('edit-' + id);
    const val = inp.value.trim();
    if (val) update(ref(db, 'tasks/' + id), { title: val });
    inp.style.display = 'none';
    const titleEl = document.getElementById('title-' + id);
    if (titleEl) titleEl.style.display = 'block';
  };
  window.editKeydown = (e, id) => {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('edit-' + id).blur(); }
    if (e.key === 'Escape') {
      const t = _tasks.find(t => t.id === id);
      if (t) document.getElementById('edit-' + id).value = t.title;
      document.getElementById('edit-' + id).blur();
    }
  };

  // ── Comments ──
  window.toggleComments = id => {
    const el = document.getElementById('comments-' + id);
    if (!el) return;
    const visible = el.style.display !== 'none';
    el.style.display = visible ? 'none' : 'block';
    if (!visible) document.getElementById('comment-input-' + id)?.focus();
  };
  window.addComment = id => {
    const inp = document.getElementById('comment-input-' + id);
    if (!inp || !inp.value.trim()) return;
    push(ref(db, 'tasks/' + id + '/comments'), {
      text: inp.value.trim(),
      author: currentUser.displayName,
      created: Date.now(),
    });
    inp.value = '';
  };
  window.commentKeydown = (e, id) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addComment(id); } };
  window.deleteComment = (taskId, cid) => remove(ref(db, 'tasks/' + taskId + '/comments/' + cid));

  // ── Clear completed ──
  window.clearAllCompleted = () => {
    const done = _tasks.filter(t => t.completed);
    if (!done.length || !confirm(`Delete all ${done.length} completed tasks?`)) return;
    done.forEach(t => remove(ref(db, 'tasks/' + t.id)));
  };

  // ── Date / time pickers ──
  function localDateStr(d) {
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  }
  function pad(n) { return String(n).padStart(2,'0'); }

  function populateDateSelects() {
    const today = new Date(); today.setHours(0,0,0,0);
    const opts = [{ value:'', label:'No date' }];
    for (let i=0;i<5;i++) {
      const d = new Date(today); d.setDate(today.getDate()+i);
      const label = i===0?`Today (${fmt(d)})`:i===1?`Tomorrow (${fmt(d)})`:fmt(d);
      opts.push({ value: localDateStr(d), label });
    }
    opts.push({ value:'custom', label:'✏️ Pick a date…' });
    ['date-sel','edit-date-sel'].forEach(id => {
      const sel = document.getElementById(id);
      if (!sel) return;
      sel.innerHTML = opts.map(o=>`<option value="${o.value}">${o.label}</option>`).join('');
    });
  }
  function fmt(d) { return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); }

  function populateTimeMenu(menuId) {
    const menu = document.getElementById(menuId);
    if (!menu) return;
    menu.innerHTML = '';
    const clear = document.createElement('button');
    clear.type='button'; clear.className='dropdown-item'; clear.textContent='No time'; clear.style.color='#94a3b8';
    const ddId = menuId.replace('-menu','');
    clear.addEventListener('click',()=>selectTime(ddId,'','No time'));
    menu.appendChild(clear);
    for (let h=0;h<24;h++) for (let m=0;m<60;m+=15) {
      const hh=pad(h), mm=pad(m), h12=h%12===0?12:h%12, per=h>=12?'PM':'AM';
      const btn=document.createElement('button');
      btn.type='button'; btn.className='dropdown-item';
      btn.dataset.value=`${hh}:${mm}`;
      btn.textContent=`${h12}:${mm} ${per}`;
      btn.addEventListener('click',()=>selectTime(ddId,`${hh}:${mm}`,`${h12}:${mm} ${per}`));
      menu.appendChild(btn);
    }
  }

  function selectTime(ddId, value, label) {
    const dd   = document.getElementById(ddId);
    const menu = document.getElementById(ddId.replace('-dd','-menu') + (ddId.includes('edit')?'':'-menu').replace('--menu',''));

    // Build the correct IDs
    let menuEl, hiddenEl, triggerEl;
    if (ddId === 'time-dd') {
      menuEl  = document.getElementById('time-menu');
      hiddenEl= document.getElementById('time-sel');
      triggerEl= dd?.querySelector('.dropdown-trigger');
    } else {
      menuEl  = document.getElementById('edit-time-menu');
      hiddenEl= document.getElementById('edit-time-sel');
      triggerEl= dd?.querySelector('.dropdown-trigger');
    }
    if (!hiddenEl || !menuEl) return;
    hiddenEl.value = value;
    if (triggerEl) {
      triggerEl.querySelector('.dd-label').textContent = label;
      triggerEl.classList.toggle('has-value', !!value);
    }
    menuEl.querySelectorAll('.dropdown-item').forEach(i => i.classList.toggle('selected', i.dataset.value===value && !!value));
    menuEl.hidden = true;
    combineDatetime(ddId.includes('edit') ? 'edit' : 'main');
  }

  window.selectTime = selectTime;

  window.toggleTimeMenu = (evt) => {
    if (evt) evt.stopPropagation();
    const menu = document.getElementById('time-menu');
    document.querySelectorAll('.dropdown-menu').forEach(m=>{ if(m!==menu) m.hidden=true; });
    menu.hidden = !menu.hidden;
  };
  window.toggleEditTimeMenu = (evt) => {
    if (evt) evt.stopPropagation();
    const menu = document.getElementById('edit-time-menu');
    document.querySelectorAll('.dropdown-menu').forEach(m=>{ if(m!==menu) m.hidden=true; });
    menu.hidden = !menu.hidden;
  };

  window.handleDateChange = () => {
    const sel  = document.getElementById('date-sel');
    const cust = document.getElementById('date-custom');
    sel.classList.toggle('has-value', !!sel.value && sel.value!=='custom');
    cust.style.display = sel.value==='custom'?'block':'none';
    if (sel.value==='custom') cust.focus();
    combineDatetime('main');
  };
  window.handleEditDateChange = () => {
    const sel  = document.getElementById('edit-date-sel');
    const cust = document.getElementById('edit-date-custom');
    sel.classList.toggle('has-value', !!sel.value && sel.value!=='custom');
    cust.style.display = sel.value==='custom'?'block':'none';
    if (sel.value==='custom') cust.focus();
    combineDatetime('edit');
  };

  function combineDatetime(mode) {
    const dateSelId  = mode==='edit' ? 'edit-date-sel'    : 'date-sel';
    const custId     = mode==='edit' ? 'edit-date-custom'  : 'date-custom';
    const timeSelId  = mode==='edit' ? 'edit-time-sel'     : 'time-sel';
    const finalId    = mode==='edit' ? 'edit-date-target'  : 'date-final';
    const sel  = document.getElementById(dateSelId);
    const cust = document.getElementById(custId);
    const time = document.getElementById(timeSelId);
    const final= document.getElementById(finalId);
    if (!final) return;
    let dateVal = sel.value==='custom' ? cust.value : sel.value;
    if (!dateVal) { final.value = ''; return; }
    final.value = time.value ? `${dateVal}T${time.value}` : dateVal;
  }

  // ── Date edit popover ──
  window.openDateEdit = id => {
    const t = _tasks.find(t=>t.id===id); if(!t) return;
    document.getElementById('date-edit-task-name').textContent = t.title;
    document.getElementById('edit-task-id').value = id;
    document.getElementById('edit-date-target').value = t.due || '';

    const sel  = document.getElementById('edit-date-sel');
    const cust = document.getElementById('edit-date-custom');
    const tSel = document.getElementById('edit-time-sel');
    const tDD  = document.getElementById('edit-time-dd');

    // Pre-fill date
    let dateOnly='', timeOnly='';
    if (t.due) {
      if (t.due.includes('T')) { [dateOnly,timeOnly] = t.due.split('T'); }
      else { dateOnly = t.due; }
    }
    const opt = [...sel.options].find(o=>o.value===dateOnly);
    if (opt) { sel.value=dateOnly; cust.style.display='none'; }
    else if (dateOnly) { sel.value='custom'; cust.value=dateOnly; cust.style.display='block'; }
    else { sel.value=''; cust.style.display='none'; }

    // Pre-fill time
    tSel.value = timeOnly;
    const trig = tDD?.querySelector('.dropdown-trigger');
    if (trig) {
      if (timeOnly) {
        const [h,m]=timeOnly.split(':'); const hi=parseInt(h); const per=hi>=12?'PM':'AM'; const h12=hi%12||12;
        trig.querySelector('.dd-label').textContent=`${h12}:${m} ${per}`;
        trig.classList.add('has-value');
      } else { trig.querySelector('.dd-label').textContent='No time'; trig.classList.remove('has-value'); }
    }
    document.getElementById('date-edit-overlay').hidden = false;
  };
  window.closeDateEdit = (e) => {
    if (e && e.target !== document.getElementById('date-edit-overlay')) return;
    document.getElementById('date-edit-overlay').hidden = true;
  };
  window.clearDateEdit = () => {
    document.getElementById('edit-date-sel').value='';
    document.getElementById('edit-date-custom').value='';
    document.getElementById('edit-date-custom').style.display='none';
    document.getElementById('edit-time-sel').value='';
    document.getElementById('edit-date-target').value='';
    const trig=document.getElementById('edit-time-dd')?.querySelector('.dropdown-trigger');
    if(trig){trig.querySelector('.dd-label').textContent='No time';trig.classList.remove('has-value');}
  };
  window.saveDateEdit = () => {
    combineDatetime('edit');
    const id  = document.getElementById('edit-task-id').value;
    const due = document.getElementById('edit-date-target').value || null;
    update(ref(db,'tasks/'+id),{due});
    document.getElementById('date-edit-overlay').hidden = true;
  };

  // ── Notifications ──
  window.toggleNotifications = async () => {
    if (!('Notification' in window)) return alert('Notifications not supported');
    if (Notification.permission === 'granted') { disableNotif(); return; }
    const p = await Notification.requestPermission();
    if (p === 'granted') enableNotif();
  };
  function enableNotif()  { document.getElementById('notif-btn').textContent='🔔 Reminders on'; document.getElementById('notif-btn').classList.add('enabled'); }
  function disableNotif() { document.getElementById('notif-btn').textContent='🔔 Enable reminders'; document.getElementById('notif-btn').classList.remove('enabled'); }
  function updateNotifBadge() { if(Notification.permission==='granted') enableNotif(); }
  updateNotifBadge();

  function checkDueReminders() {
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    const notified = JSON.parse(localStorage.getItem(STORAGE_NOTIF)||'[]');
    const now = new Date();
    _tasks.filter(t=>!t.completed&&t.due).forEach(t=>{
      const due=new Date(t.due.includes('T')?t.due:t.due+'T00:00:00');
      const diff=(due-now)/60000;
      if(diff<=15&&diff>-60&&!notified.includes(t.id)){
        new Notification('⏰ Task due soon',{body:t.title,tag:'due:'+t.id});
        notified.push(t.id);
        localStorage.setItem(STORAGE_NOTIF,JSON.stringify(notified.slice(-50)));
      }
    });
  }

  // ── Settings ──
  window.openSettings  = () => document.getElementById('settings-modal').classList.add('show');
  window.closeSettings = () => document.getElementById('settings-modal').classList.remove('show');
  window.saveDisplayName = () => {
    const name = document.getElementById('display-name-input').value.trim();
    if (!name) return;
    localStorage.setItem(STORAGE_NAME, name);
    currentUser = { displayName: name, uid: name };
    closeSettings();
  };

  // Close dropdowns on outside click
  document.addEventListener('click', () => {
    document.querySelectorAll('.dropdown-menu').forEach(m => { m.hidden = true; });
  });
</script>
</body>
</html>
